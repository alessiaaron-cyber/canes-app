<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Canes Rivalry" />
  <meta name="theme-color" content="#f3f5f8" />
  <link rel="apple-touch-icon" href="icon.png">
  <title>Canes Rivalry</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --red:#c8102e;
      --ink:#101827;
      --muted:#667085;
      --bg:#f3f5f8;
      --card:#ffffff;
      --line:#e4e7ec;
      --black:#111827;
      --shadow:0 12px 30px rgba(16,24,40,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink)}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      padding:calc(10px + env(safe-area-inset-top)) 12px calc(88px + env(safe-area-inset-bottom));
    }
    .hero{
      background:linear-gradient(180deg,#ffffff 0%,#fbfcfe 100%);
      border:1px solid var(--line);
      border-radius:28px;
      padding:15px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero:before{
      content:"";
      position:absolute;
      top:0;left:0;right:0;
      height:6px;
      background:linear-gradient(90deg,var(--red),#111827,var(--red));
    }
    .hero.playoff-mode:before{
      height:8px;
      background:linear-gradient(90deg,#111827,var(--red),#111827,var(--red));
    }
    .topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      text-transform:uppercase;
      font-size:11px;
      font-weight:950;
      letter-spacing:.08em;
      margin-top:3px;
    }
    .top-actions{display:flex;align-items:center;gap:7px}
    .badge{
      background:var(--red);
      color:white;
      border-radius:999px;
      padding:6px 10px;
      font-weight:1000;
      font-size:11px;
      letter-spacing:.05em;
      white-space:nowrap;
    }
    .badge.playoff{
      background:linear-gradient(135deg,#111827,#c8102e);
      box-shadow:0 0 0 2px rgba(200,16,46,.12), 0 6px 15px rgba(200,16,46,.22);
    }
    .refresh-mini{
      width:auto;
      padding:6px 9px;
      border-radius:999px;
      background:#eef1f5;
      color:var(--ink);
      border:1px solid var(--line);
      box-shadow:none;
      font-size:11px;
      font-weight:1000;
      letter-spacing:.03em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    h1{
      text-align:center;
      margin:10px 0 4px;
      font-size:32px;
      line-height:.94;
      letter-spacing:-.06em;
      font-weight:1000;
    }
    .meta{
      text-align:center;
      color:var(--muted);
      font-weight:850;
      font-size:13px;
      line-height:1.3;
    }
    .scoreboard{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:13px;
    }
    .score-card{
      background:white;
      border:1px solid var(--line);
      border-radius:22px;
      text-align:center;
      padding:13px 8px 12px;
      box-shadow:0 6px 16px rgba(16,24,40,.045);
    }
    .name{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.09em;
      font-weight:1000;
      font-size:12px;
    }
    .bigscore{
      margin-top:5px;
      font-size:66px;
      line-height:.88;
      font-weight:1000;
      letter-spacing:-.085em;
    }
    .leader{
      margin-top:10px;
      background:var(--black);
      color:white;
      border-radius:18px;
      padding:11px 10px;
      text-align:center;
      font-size:16px;
      font-weight:1000;
      letter-spacing:.01em;
    }
    .leader.playoff-mode{background:linear-gradient(135deg,#111827,#7f1d1d)}
    .playoff-strip{
      margin-top:10px;
      background:#fff1f2;
      border:1px solid #fecdd3;
      color:#9f1239;
      border-radius:14px;
      padding:8px 10px;
      text-align:center;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:14px;
      margin-top:12px;
      box-shadow:0 8px 22px rgba(16,24,40,.045);
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .section-title{
      font-size:16px;
      font-weight:1000;
      letter-spacing:-.025em;
    }
    .mini{
      color:var(--muted);
      font-size:12px;
      font-weight:850;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .panel{
      background:#fbfcfe;
      border:1px solid var(--line);
      border-radius:19px;
      padding:11px;
    }
    .panel-title{
      margin:0 0 8px;
      font-size:15px;
      font-weight:1000;
      letter-spacing:-.02em;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    label{
      display:block;
      margin:8px 0 4px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:10px;
      font-weight:1000;
    }
    select,input{
      width:100%;
      min-height:42px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      color:var(--ink);
      padding:9px 8px;
      font-size:14px;
      font-weight:850;
      outline:none;
    }
    input[type=number]{
      text-align:center;
      font-size:17px;
      padding-left:2px;
      padding-right:2px;
    }
    .stat-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 44px 44px;
      gap:7px;
      align-items:end;
      margin-top:8px;
    }
    .player-mini{
      font-size:12px;
      font-weight:1000;
      color:#344054;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding-bottom:11px;
    }
    .live-score{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .live-box{
      background:#fbfcfe;
      border:1px solid var(--line);
      border-radius:20px;
      text-align:center;
      padding:13px 8px 11px;
    }
    .live-num{
      font-size:44px;
      line-height:.9;
      font-weight:1000;
      letter-spacing:-.06em;
    }
    .live-label{
      margin-top:6px;
      color:var(--muted);
      font-size:11px;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.07em;
    }
    button{
      width:100%;
      border:0;
      border-radius:18px;
      padding:15px 12px;
      background:var(--red);
      color:white;
      font-size:17px;
      font-weight:1000;
      box-shadow:0 10px 22px rgba(200,16,46,.22);
    }
    button.secondary{background:var(--black);box-shadow:none}
    button.light{
      background:white;
      color:var(--ink);
      border:1px solid var(--line);
      box-shadow:none;
      padding:12px 9px;
      font-size:13px;
    }
    button.tiny-btn{
      width:auto;
      padding:7px 9px;
      border-radius:11px;
      font-size:11px;
      box-shadow:none;
      background:#111827;
    }
    button.dangerish{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    button:disabled{opacity:.55}
    .tabs{
      position:fixed;
      left:0;right:0;bottom:0;
      z-index:10;
      display:flex;
      justify-content:center;
      padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(16px);
      border-top:1px solid var(--line);
    }
    .tabs-inner{
      max-width:430px;
      width:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }
    .tab{
      padding:10px 4px;
      border-radius:15px;
      background:#eef1f5;
      color:var(--ink);
      box-shadow:none;
      font-size:12px;
      font-weight:1000;
    }
    .tab.active{background:var(--black);color:white}
    .hidden{display:none}
    .row-card{
      background:white;
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      margin-bottom:9px;
      box-shadow:0 5px 14px rgba(16,24,40,.035);
    }
    .row-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      font-weight:1000;
    }
    .row-sub{
      color:#344054;
      font-size:12px;
      font-weight:750;
      line-height:1.45;
    }
    .card-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .edit-form{
      margin-top:10px;
      border-top:1px solid var(--line);
      padding-top:10px;
    }
    .edit-form .manage-fields{
      margin-top:6px;
    }
    .total-only{
      text-align:center;
      padding:16px 12px;
      color:var(--muted);
      font-weight:850;
      line-height:1.4;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:8px;
    }
    .manage-list{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .manage-item{
      border:1px solid var(--line);
      background:#fff;
      border-radius:15px;
      padding:10px;
    }
    .manage-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-weight:1000;
      font-size:13px;
      margin-bottom:6px;
    }
    .manage-fields{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
    }
    .manage-fields.full{grid-template-columns:1fr}
    .note{
      margin-top:9px;
      color:var(--muted);
      font-size:12px;
      font-weight:750;
      line-height:1.35;
    }
    .danger{
      margin-top:10px;
      color:#991b1b;
      background:#fee2e2;
      border:1px solid #fecaca;
      border-radius:15px;
      padding:10px;
      font-size:12px;
      font-weight:850;
      line-height:1.35;
    }
    .instruction-box{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:11px;
      font-size:12px;
      line-height:1.42;
      color:#344054;
      font-weight:750;
    }
    .instruction-box strong{color:#111827}
    .loader{
      padding:35px 20px;
      text-align:center;
      color:var(--muted);
      font-weight:950;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:90px;
      transform:translateX(-50%);
      z-index:20;
      max-width:90vw;
      background:var(--black);
      color:white;
      border-radius:999px;
      padding:11px 15px;
      font-size:13px;
      font-weight:950;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
    }
    .toast.show{opacity:1}
  .rivalry-board{
      background:linear-gradient(180deg,#ffffff 0%,#fbfcfe 100%);
      border:1px solid var(--line);
      border-radius:24px;
      padding:14px;
      margin-top:12px;
      box-shadow:0 10px 24px rgba(16,24,40,.06);
      overflow:hidden;
      position:relative;
    }
    .rivalry-board:before{
      content:"";
      position:absolute;
      left:0;right:0;top:0;
      height:5px;
      background:linear-gradient(90deg,var(--red),#111827,var(--red));
    }
    .rivalry-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:4px 0 12px;
    }
    .rivalry-title-main{
      font-size:20px;
      font-weight:1000;
      letter-spacing:-.035em;
    }
    .rivalry-title-tag{
      background:#111827;
      color:white;
      border-radius:999px;
      padding:6px 9px;
      font-size:10px;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.07em;
      white-space:nowrap;
    }
    .headline-stat{
      background:linear-gradient(135deg,#111827 0%,#1f2937 52%,#c8102e 130%);
      color:white;
      border-radius:22px;
      padding:15px;
      box-shadow:0 10px 22px rgba(17,24,39,.18);
      margin-bottom:10px;
    }
    .headline-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }
    .headline-icon{
      font-size:29px;
      line-height:1;
    }
    .headline-label{
      color:rgba(255,255,255,.72);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:10px;
      font-weight:1000;
      margin-bottom:6px;
    }
    .headline-value{
      font-size:38px;
      line-height:.95;
      font-weight:1000;
      letter-spacing:-.06em;
    }
    .headline-sub{
      color:rgba(255,255,255,.78);
      font-size:12px;
      font-weight:800;
      line-height:1.3;
      margin-top:8px;
    }
    .stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:10px;
    }
    .stat-tile{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:11px 10px;
      min-height:98px;
      box-shadow:0 6px 15px rgba(16,24,40,.04);
      position:relative;
      overflow:hidden;
    }
    .stat-tile:before{
      content:"";
      position:absolute;
      left:0;top:0;bottom:0;
      width:4px;
      background:var(--red);
      opacity:.9;
    }
    .stat-tile.alt:before{
      background:#111827;
    }
    .stat-row-icon{
      display:flex;
      align-items:center;
      gap:7px;
      margin-bottom:8px;
    }
    .stat-icon{
      width:30px;
      height:30px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3f5f8;
      font-size:17px;
      flex:0 0 30px;
    }
    .stat-label{
      color:var(--muted);
      font-size:9px;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.075em;
      line-height:1.1;
    }
    .stat-value{
      font-size:23px;
      font-weight:1000;
      line-height:1;
      letter-spacing:-.045em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .stat-sub{
      margin-top:5px;
      color:#667085;
      font-size:11px;
      font-weight:800;
      line-height:1.25;
    }
    .ticker{
      margin-top:12px;
      border:1px solid #fecaca;
      border-radius:17px;
      background:linear-gradient(180deg,#fff7f7,#ffffff);
      padding:11px;
      font-size:12px;
      font-weight:850;
      color:#344054;
      line-height:1.38;
    }
    .ticker strong{
      color:var(--red);
      font-weight:1000;
    }
  
    /* Mobile form fix: prevent Date/Opponent overlap in Manage and History edit forms */
    .manage-fields{
      grid-template-columns:1fr !important;
      gap:12px !important;
    }
    .manage-item .manage-fields,
    .section .manage-fields{
      grid-template-columns:1fr !important;
    }
    .manage-fields input,
    .manage-fields select{
      min-width:0;
      width:100%;
    }

  
    /* Width polish: use more of the iPhone screen */
    .app{
      max-width:none !important;
      width:100% !important;
      padding-left:8px !important;
      padding-right:8px !important;
    }
    .tabs-inner{
      max-width:none !important;
      width:100% !important;
    }

    /* iOS date/input fix: keep fields inside cards */
    input, select{
      max-width:100% !important;
      min-width:0 !important;
      box-sizing:border-box !important;
    }
    input[type="date"]{
      width:100% !important;
      max-width:100% !important;
      min-width:0 !important;
      display:block !important;
      -webkit-appearance:none;
      appearance:none;
    }
    .manage-item,
    .section,
    .hero{
      max-width:100% !important;
      overflow:hidden;
    }
    .manage-fields > div{
      min-width:0 !important;
      width:100% !important;
    }

  
    /* Final Game Day full-width polish */
    body{
      overflow-x:hidden !important;
    }
    .app{
      max-width:none !important;
      width:100vw !important;
      padding-left:6px !important;
      padding-right:6px !important;
      padding-top:calc(4px + env(safe-area-inset-top)) !important;
    }
    #gameView,
    #historyView,
    #alltimeView,
    #manageView{
      width:100% !important;
    }
    #gameView .hero,
    #gameView .section{
      width:100% !important;
      max-width:none !important;
      margin-left:0 !important;
      margin-right:0 !important;
    }
    #gameView .hero{
      border-radius:24px !important;
      padding-left:12px !important;
      padding-right:12px !important;
    }
    #gameView .section{
      border-radius:22px !important;
      padding-left:12px !important;
      padding-right:12px !important;
    }
    #gameView .scoreboard{
      gap:8px !important;
    }
    #gameView .score-card{
      padding-left:6px !important;
      padding-right:6px !important;
    }
    #gameView .bigscore{
      font-size:clamp(58px, 18vw, 78px) !important;
    }
    #gameView h1{
      font-size:clamp(34px, 10vw, 46px) !important;
      margin-top:8px !important;
    }
    #gameView .panel{
      padding-left:10px !important;
      padding-right:10px !important;
    }
    .tabs{
      padding-left:6px !important;
      padding-right:6px !important;
    }
    .tabs-inner{
      max-width:none !important;
      width:100% !important;
    }

  
    /* Game Day visual scale fix: make it feel like the other tabs, not tiny bubbles */
    #gameView{
      padding:0 !important;
      margin:0 !important;
    }

    #gameView .hero,
    #gameView .section{
      width:100% !important;
      margin-left:0 !important;
      margin-right:0 !important;
      border-radius:26px !important;
      padding:16px 14px !important;
      box-shadow:0 12px 30px rgba(16,24,40,.075) !important;
    }

    #gameView .hero{
      min-height:0 !important;
      padding-top:18px !important;
      padding-bottom:18px !important;
    }

    #gameView h1{
      font-size:46px !important;
      line-height:.95 !important;
      margin:12px 0 6px !important;
      letter-spacing:-.07em !important;
    }

    #gameView .meta{
      font-size:16px !important;
      font-weight:900 !important;
    }

    #gameView .playoff-strip{
      margin-top:14px !important;
      padding:12px 10px !important;
      font-size:13px !important;
      border-radius:18px !important;
    }

    #gameView .scoreboard{
      gap:12px !important;
      margin-top:16px !important;
    }

    #gameView .score-card{
      border-radius:24px !important;
      padding:18px 8px 16px !important;
      min-height:150px !important;
      display:flex !important;
      flex-direction:column !important;
      align-items:center !important;
      justify-content:center !important;
    }

    #gameView .name{
      font-size:14px !important;
      letter-spacing:.12em !important;
      margin-bottom:8px !important;
    }

    #gameView .bigscore{
      font-size:86px !important;
      line-height:.82 !important;
      letter-spacing:-.09em !important;
    }

    #gameView .leader{
      margin-top:14px !important;
      padding:15px 12px !important;
      border-radius:22px !important;
      font-size:20px !important;
    }

    #gameView .section-head{
      margin-bottom:14px !important;
    }

    #gameView .section-title{
      font-size:22px !important;
      letter-spacing:-.04em !important;
    }

    #gameView .mini{
      font-size:15px !important;
      font-weight:950 !important;
    }

    #gameView .panel{
      border-radius:24px !important;
      padding:16px 14px !important;
      min-height:190px !important;
      display:flex !important;
      flex-direction:column !important;
      justify-content:center !important;
    }

    #gameView .panel-title{
      font-size:22px !important;
      margin-bottom:12px !important;
    }

    #gameView label{
      font-size:12px !important;
      letter-spacing:.09em !important;
      margin-top:10px !important;
      margin-bottom:6px !important;
    }

    #gameView select,
    #gameView input{
      min-height:56px !important;
      border-radius:20px !important;
      font-size:19px !important;
      padding:12px 14px !important;
      font-weight:950 !important;
    }

    #gameView input[type=number]{
      font-size:24px !important;
      padding-left:4px !important;
      padding-right:4px !important;

      </div>

<script>
const SUPABASE_URL = "https://hhhxgbztfizmwxbuoprq.supabase.co";
const SUPABASE_KEY = "sb_publishable_4laNe86TxiC5pLkAF5NeIg_oMmf1unQ";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let S = {
  seasons: [],
  activeSeason: null,
  selectedHistorySeasonId: null,
  editingGameId: null,
  editPanel: 'result',
  games: [],
  allGames: [],
  picks: [],
  allPicks: [],
  players: [],
  currentGame: null,
  lastRecap: null,
  user: null,
  realtimeChannel: null,
  suppressRealtimeRender: false,
  form: {
    a1:"", a2:"", j1:"", j2:"",
    ag1:0, aa1:0, ag2:0, aa2:0,
    jg1:0, ja1:0, jg2:0, ja2:0,
    firstGoal:""
  }
};

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 2300);
}

function showTab(tab, btn){
  ["gameView","historyView","manageView","rosterView","scheduleView","alltimeView"].forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(tab + "View").classList.remove("hidden");
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

async function manualRefresh(){
  try{
    await loadAll();
    toast("Refreshed.");
  } catch(e){
    toast("Refresh failed.");
  }
}

function userDisplayName(){
  const email = S.user?.email || "";
  if (!email) return "";
  const local = email.split("@")[0] || email;
  if (local.toLowerCase().includes("aaron")) return "Aaron";
  if (local.toLowerCase().includes("julie")) return "Julie";
  return email;
}

function isSignedIn(){
  return !!S.user;
}

async function refreshAuth(){
  const { data } = await db.auth.getUser();
  S.user = data?.user || null;
}

async function signInWithEmailCode(){
  await openAuthModal();
}

async function signOut(){
  await db.auth.signOut();
  S.user = null;
  renderAll();
  toast("Signed out.");
}

async function requireAuth(actionLabel = "edit"){
  await refreshAuth();
  if (S.user) return true;
  const ok = await openAuthModal();
  return !!ok && !!S.user;
}

let authModalResolve = null;
let pendingAuthEmail = "";

function openAuthModal(){
  return new Promise((resolve) => {
    authModalResolve = resolve;
    pendingAuthEmail = "";
    document.getElementById("authModal")?.classList.remove("hidden");
    document.getElementById("authEmailStep")?.classList.remove("hidden");
    document.getElementById("authCodeStep")?.classList.add("hidden");
    const sub = document.getElementById("authModalSub");
    if (sub) sub.textContent = "Enter your approved email. We’ll send you an 8-digit code.";
    const emailInput = document.getElementById("authEmailInput");
    const codeInput = document.getElementById("authCodeInput");
    if (emailInput) emailInput.value = "";
    if (codeInput) codeInput.value = "";
    setTimeout(() => emailInput?.focus(), 150);
  });
}

function closeAuthModal(success){
  document.getElementById("authModal")?.classList.add("hidden");
  if (authModalResolve){
    authModalResolve(!!success);
    authModalResolve = null;
  }
}

async function sendAuthCodeFromModal(){
  const email = document.getElementById("authEmailInput")?.value?.trim();
  if (!email) return toast("Enter your email.");
  pendingAuthEmail = email;

  const send = await db.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: true }
  });

  if (send.error){
    toast(send.error.message || "Could not send code.");
    return;
  }

  document.getElementById("authEmailStep")?.classList.add("hidden");
  document.getElementById("authCodeStep")?.classList.remove("hidden");
  const sub = document.getElementById("authModalSub");
  if (sub) sub.textContent = `Enter the 8-digit code sent to ${email}.`;
  setTimeout(() => document.getElementById("authCodeInput")?.focus(), 150);
}

async function verifyAuthCodeFromModal(){
  const token = document.getElementById("authCodeInput")?.value?.trim();
  if (!pendingAuthEmail) return toast("Enter your email first.");
  if (!token || token.length < 6) return toast("Enter the code from your email.");

  const verify = await db.auth.verifyOtp({
    email: pendingAuthEmail,
    token,
    type: "email"
  });

  if (verify.error){
    toast(verify.error.message || "Code did not work.");
    return;
  }

  await refreshAuth();
  renderAll();
  toast("Signed in.");
  closeAuthModal(true);
}


function isGameDayEditingActive(){
  const el = document.activeElement;
  if (!el) return false;
  const gameView = document.getElementById("gameView");
  return gameView && gameView.contains(el) && ["INPUT","SELECT","TEXTAREA"].includes(el.tagName);
}

function mergeRow(list, row){
  const idx = list.findIndex(x => x.id === row.id);
  if (idx >= 0) list[idx] = {...list[idx], ...row};
  else list.push(row);
}

function removeDeletedRow(list, oldRow){
  const idx = list.findIndex(x => x.id === oldRow.id);
  if (idx >= 0) list.splice(idx, 1);
}

function applyRealtimePayload(payload){
  if (!S.currentGame) return;
  const table = payload.table;
  const row = payload.new;
  const oldRow = payload.old;

  if (table === "games"){
    const targetId = row?.id || oldRow?.id;
    if (targetId !== S.currentGame.id) return;

    if (payload.eventType === "DELETE"){
      removeDeletedRow(S.games, oldRow);
      removeDeletedRow(S.allGames, oldRow);
      return;
    }

    mergeRow(S.games, row);
    mergeRow(S.allGames, row);
    S.currentGame = {...S.currentGame, ...row};

    if (!isGameDayEditingActive()){
      hydrateForm();
      renderAll();
    } else {
      renderHistory();
      renderAllTime();
      renderManage();
    }
  }

  if (table === "picks"){
    const gameId = row?.game_id || oldRow?.game_id;
    if (gameId !== S.currentGame.id) return;

    if (payload.eventType === "DELETE"){
      removeDeletedRow(S.picks, oldRow);
      removeDeletedRow(S.allPicks, oldRow);
      return;
    }

    mergeRow(S.picks, row);
    mergeRow(S.allPicks, row);

    if (!isGameDayEditingActive()){
      hydrateForm();
      renderAll();
    } else {
      renderHistory();
      renderAllTime();
      renderManage();
    }
  }
}

async function setupRealtime(){
  if (S.realtimeChannel) return;

  S.realtimeChannel = db
    .channel("current-game-sync")
    .on("postgres_changes", { event:"*", schema:"public", table:"games" }, applyRealtimePayload)
    .on("postgres_changes", { event:"*", schema:"public", table:"picks" }, applyRealtimePayload)
    .subscribe((status) => {
      console.log("Realtime status:", status);
    });
}

async function saveCurrentGameField(field, value){
  if (!(await requireAuth("save game updates"))) return;
  if (!S.currentGame?.id) return;

  const patch = {};
  patch[field] = value || null;

  const res = await db.from("games").update(patch).eq("id", S.currentGame.id);
  if (res.error){
    toast(res.error.message || "Could not save.");
    return;
  }

  S.currentGame = {...S.currentGame, ...patch};
  mergeRow(S.games, S.currentGame);
  mergeRow(S.allGames, S.currentGame);
}

async function saveDraftPick(key){
  if (!(await requireAuth("save picks"))) return;
  if (!S.currentGame?.id) return;

  const map = {
    a1: ["Aaron", 1, S.form.a1, S.form.ag1, S.form.aa1],
    a2: ["Aaron", 2, S.form.a2, S.form.ag2, S.form.aa2],
    j1: ["Julie", 1, S.form.j1, S.form.jg1, S.form.ja1],
    j2: ["Julie", 2, S.form.j2, S.form.jg2, S.form.ja2],
    ag1: ["Aaron", 1, S.form.a1, S.form.ag1, S.form.aa1],
    aa1: ["Aaron", 1, S.form.a1, S.form.ag1, S.form.aa1],
    ag2: ["Aaron", 2, S.form.a2, S.form.ag2, S.form.aa2],
    aa2: ["Aaron", 2, S.form.a2, S.form.ag2, S.form.aa2],
    jg1: ["Julie", 1, S.form.j1, S.form.jg1, S.form.ja1],
    ja1: ["Julie", 1, S.form.j1, S.form.jg1, S.form.ja1],
    jg2: ["Julie", 2, S.form.j2, S.form.jg2, S.form.ja2],
    ja2: ["Julie", 2, S.form.j2, S.form.ja2],
  };

  const spec = map[key];
  if (!spec) return;

  const [owner, slot, player, goals, assists] = spec;

  if (S.currentGame.status === "Scheduled"){
    await saveCurrentGameField("status", "In Progress");
  }

  const cleanPlayer = player || "";
  const cleanGoals = cleanPlayer ? goals : 0;
  const cleanAssists = cleanPlayer ? assists : 0;
  const points = cleanPlayer ? pickPoints(cleanPlayer, cleanGoals, cleanAssists, S.form.firstGoal) : 0;
  await upsertPick(S.currentGame.id, owner, slot, cleanPlayer, cleanGoals, cleanAssists, points);
}



function esc(x){
  return (x ?? "").toString().replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function win(a,j){
  return Number(a)>Number(j) ? "Aaron" : Number(j)>Number(a) ? "Julie" : "Tie";
}

function pickPoints(player, goals, assists, firstGoal){
  goals = Number(goals || 0);
  assists = Number(assists || 0);
  let pts = goals * 2 + assists;
  if (player && firstGoal && player === firstGoal && goals > 0) pts += 1;
  return pts;
}

function liveScore(){
  const f = S.form;
  const a =
    pickPoints(f.a1,f.ag1,f.aa1,f.firstGoal) +
    pickPoints(f.a2,f.ag2,f.aa2,f.firstGoal);
  const j =
    pickPoints(f.j1,f.jg1,f.ja1,f.firstGoal) +
    pickPoints(f.j2,f.jg2,f.ja2,f.firstGoal);
  return {a,j,w:win(a,j)};
}

function totals(){
  const finals = S.games.filter(g => g.status === "Final");
  return {
    a: finals.reduce((n,g) => n + Number(g.aaron_points || 0), 0),
    j: finals.reduce((n,g) => n + Number(g.julie_points || 0), 0)
  };
}

  S.form[k] = v;

  if (k === "firstGoal"){

    ["a1","a2","j1","j2"].forEach(saveDraftPick);

}

function setNum(k,v){

async function loadAll(){
  await refreshAuth();
  const seasons = await db.from("seasons").select("*").order("season_key");
  if (seasons.error) throw seasons.error;

  S.seasons = seasons.data || [];
  S.activeSeason = S.seasons.find(s => s.is_active) || S.seasons[S.seasons.length - 1];
  if (!S.activeSeason) throw new Error("No active season found.");
  if (!S.selectedHistorySeasonId) S.selectedHistorySeasonId = S.activeSeason.id;

  const [allGames, activeGames, players] = await Promise.all([
    db.from("games").select("*").order("game_number"),
    db.from("games").select("*").eq("season_id", S.activeSeason.id).order("game_number"),
    db.from("players").select("*").eq("is_active", true).order("player_name")
  ]);

  if (allGames.error) throw allGames.error;
  if (activeGames.error) throw activeGames.error;

  S.allGames = allGames.data || [];
  S.games = activeGames.data || [];
  S.players = players.data || [];

  if (S.allGames.length){
    const ids = S.allGames.map(g => g.id);
    const picks = await db.from("picks").select("*").in("game_id", ids).order("pick_slot");
    if (picks.error) throw picks.error;
    S.allPicks = picks.data || [];
    S.picks = S.allPicks.filter(p => S.games.some(g => g.id === p.game_id));
  } else {
    S.allPicks = [];
    S.picks = [];
  }

  S.currentGame = S.games.find(g => g.status !== "Final" && g.status !== "Hidden");
  if (!S.currentGame) await createNextGame();

  hydrateForm();
  await setupRealtime();
  renderAll();
}

    .map(p => (p.is_carry_forward ? "*" : "") + p.player_name)

function computeFunStats(){
  const finals = S.allGames.filter(g => g.status === "Final");
  const activeFinals = S.games.filter(g => g.status === "Final");
  const sortedActive = [...activeFinals].sort((a,b)=>Number(a.game_number)-Number(b.game_number));

  let currentStreak = "—";
  if (sortedActive.length){
    const lastWinner = sortedActive[sortedActive.length-1].winner;
    if (lastWinner && lastWinner !== "Tie"){
      let n = 0;
      for (let i=sortedActive.length-1; i>=0; i--){
        if (sortedActive[i].winner === lastWinner) n++;
        else break;
      }
      currentStreak = `${lastWinner} W${n}`;
    } else currentStreak = "No streak";
  }

  let longest = {winner:"—", count:0};
  let current = {winner:null, count:0};
  sortedActive.forEach(g=>{
    if (!g.winner || g.winner === "Tie"){
      current = {winner:null, count:0};
    } else if (g.winner === current.winner){
      current.count++;
    } else {
      current = {winner:g.winner, count:1};
    }
    if (current.count > longest.count) longest = {...current};
  });

  const biggest = finals.reduce((best,g)=>{
    const margin = Math.abs(Number(g.aaron_points||0)-Number(g.julie_points||0));
    return margin > best.margin ? {game:g, margin} : best;
  }, {game:null, margin:0});

  const bestScore = finals.reduce((best,g)=>{
    const maxScore = Math.max(Number(g.aaron_points||0), Number(g.julie_points||0));
    return maxScore > best.score ? {game:g, score:maxScore} : best;
  }, {game:null, score:0});

  const pickCounts = {};
  const pickPointsMap = {};
  S.allPicks.forEach(p=>{
    pickCounts[p.player_name] = (pickCounts[p.player_name] || 0) + 1;
    pickPointsMap[p.player_name] = (pickPointsMap[p.player_name] || 0) + Number(p.points || 0);
  });
  const mostPicked = Object.entries(pickCounts).sort((a,b)=>b[1]-a[1])[0];
  const bestAvg = Object.keys(pickCounts)
    .map(name=>({name, avg: pickPointsMap[name] / pickCounts[name], count: pickCounts[name]}))
    .filter(x=>x.count >= 2 && x.avg > 0)
    .sort((a,b)=>b.avg-a.avg)[0];

  const firstGoals = {};
  finals.forEach(g=>{
    if (g.first_goal_scorer) firstGoals[g.first_goal_scorer] = (firstGoals[g.first_goal_scorer] || 0) + 1;
  });
  const topFirstGoal = Object.entries(firstGoals).sort((a,b)=>b[1]-a[1])[0];

  return {currentStreak, longest, biggest, bestScore, mostPicked, bestAvg, topFirstGoal};
}

async function createNextGame(){
  const maxNum = S.games.reduce((m,g) => Math.max(m, Number(g.game_number || 0)), 0);
  const nextNum = maxNum + 1;
  const firstPicker = nextNum % 2 ? "Julie" : "Aaron";
  const gameType = nextNum <= 82 ? "Regular Season" : "Playoffs";

  const ins = await db.from("games").insert({
    season_id:S.activeSeason.id,
    game_number:nextNum,
    game_type:gameType,
    opponent:"Next Game",
    first_picker:firstPicker,
    status:"Scheduled",
    aaron_points:0,
    julie_points:0
  }).select().single();

  if (ins.error) throw ins.error;
  S.currentGame = ins.data;
  S.games.push(ins.data);
  S.allGames.push(ins.data);
}

async function upsertPick(gameId, owner, slot, player, goals, assists, points){
  const existing = S.allPicks.find(p => p.game_id===gameId && p.owner===owner && Number(p.pick_slot)===slot);

  const row = {
    game_id:gameId,
    owner,
    pick_slot:slot,
    player_name:player,
    goals:Number(goals||0),
    assists:Number(assists||0),
    points:Number(points||0),
    is_carry_forward:false,
    original_pick_text:player
  };

  if (existing){
    const res = await db.from("picks").update(row).eq("id", existing.id);
    if (res.error) throw res.error;
  } else {
    const res = await db.from("picks").insert(row);
    if (res.error) throw res.error;
  }
}


function buildPostgameRecap(game, live){
  const winnerText = live.w === "Tie" ? "Dead heat" : `${live.w} takes it`;
  const scoreText = `${live.a}-${live.j}`;
  const margin = Math.abs(live.a - live.j);
  let vibe = "Scoreboard updated. The rivalry continues.";
  if (live.w === "Tie") vibe = "No bragging rights tonight. The tension rolls into the next game.";
  else if (margin >= 5) vibe = "That was a statement game. The group chat may not survive this.";
  else if (margin <= 1) vibe = "A tight one. Every assist mattered and the chirps are absolutely valid.";
  else vibe = "Solid win. Enough room to brag, not enough room to get comfortable.";

  const fg = S.form.firstGoal ? ` First goal tracked: ${S.form.firstGoal}.` : "";
  return {
    title: `${winnerText} ${scoreText}`,
    copy: `${vibe}${fg}`
  };
}

async function finalizeGame(){
  if (!(await requireAuth('finalize games'))) return;
  try{
    const g = S.currentGame;
    if (!g) return toast("No current game.");
    if (!S.form.a1 || !S.form.a2 || !S.form.j1 || !S.form.j2) return toast("Pick all 4 players first.");
    if (!confirm("Lock this game as final? This will save the result and advance to the next game.")) return;

    const l = liveScore();
    const recap = l.w === "Tie"
      ? `Tie ${l.a}-${l.j}. Nobody gets bragging rights.`
      : `${l.w} wins ${l.a}-${l.j}. Scoreboard never lies.`;

    const upd = await db.from("games").update({
      status:"Final",
      first_goal_scorer:S.form.firstGoal || null,
      aaron_points:l.a,
      julie_points:l.j,
      winner:l.w,
      recap
    }).eq("id", g.id);

    if (upd.error) throw upd.error;

    await upsertPick(g.id,"Aaron",1,S.form.a1,S.form.ag1,S.form.aa1,pickPoints(S.form.a1,S.form.ag1,S.form.aa1,S.form.firstGoal));
    await upsertPick(g.id,"Aaron",2,S.form.a2,S.form.ag2,S.form.aa2,pickPoints(S.form.a2,S.form.ag2,S.form.aa2,S.form.firstGoal));
    await upsertPick(g.id,"Julie",1,S.form.j1,S.form.jg1,S.form.ja1,pickPoints(S.form.j1,S.form.jg1,S.form.ja1,S.form.firstGoal));
    await upsertPick(g.id,"Julie",2,S.form.j2,S.form.jg2,S.form.ja2,pickPoints(S.form.j2,S.form.jg2,S.form.ja2,S.form.firstGoal));

    S.lastRecap = buildPostgameRecap(g, l);
    await loadAll();
    toast(S.lastRecap ? S.lastRecap.title : "Game locked. Next game loaded.");
  } catch(e){
    toast(e.message || "Could not finalize.");
  }
}

  const date = document.getElementById("newGameDate")?.value || null;
  const opponent = document.getElementById("newGameOpponent")?.value?.trim() || "TBD";
  const gameType = document.getElementById("newGameType")?.value || "Regular Season";
  const firstPicker = document.getElementById("newGameFirstPicker")?.value || "Aaron";
  try{
    const existing = S.games.find(g =>
      Number(g.season_id) === Number(S.activeSeason.id) &&
      (g.game_date || "") === (date || "") &&
      String(g.opponent || "").toLowerCase() === String(opponent || "").toLowerCase() &&
      g.status !== "Final"
    );

    if (existing){
      const res = await db.from("games").update({
        game_date:date,
        opponent,
        game_type:gameType,
        first_picker:firstPicker,
        status:"Scheduled",
        aaron_points:0,
        julie_points:0
      }).eq("id", existing.id);
      if (res.error) throw res.error;
      await loadAll();
      toast("Game reactivated.");
      return;
    }

    const maxNum = S.games.reduce((m,g) => Math.max(m, Number(g.game_number || 0)), 0);
    const res = await db.from("games").insert({
      season_id:S.activeSeason.id,
      game_number:maxNum + 1,
      game_date:date,
      opponent,
      game_type:gameType,
      first_picker:firstPicker,
      status:"Scheduled",
      aaron_points:0,
      julie_points:0
    });
    if (res.error) throw res.error;
    await loadAll();
    toast("Game added.");
  } catch(e){
    toast(e.message || "Could not add game.");
  }
}


async function updateGameField(gameId, field, value){
  if (!(await requireAuth('manage schedule'))) return;
  try{
    const patch = {};
    patch[field] = value || null;
    const res = await db.from("games").update(patch).eq("id", gameId).neq("status", "Final");
    if (res.error) throw res.error;
    await loadAll();
    toast("Game updated.");
  } catch(e){
    toast(e.message || "Could not update game.");
  }
}

async function hideGame(gameId){
  if (!(await requireAuth('manage schedule'))) return;
  if (!confirm("Remove this upcoming game from the app? It will be hidden, not deleted.")) return;
  try{
    const res = await db.from("games").update({status:"Hidden"}).eq("id", gameId).neq("status", "Final");
    if (res.error) throw res.error;
    await loadAll();
    toast("Game removed.");
  } catch(e){
    toast(e.message || "Could not remove game.");
  }
}


async function saveHistoryGame(gameId){
  if (!(await requireAuth('edit history'))) return;
  try{
    if (!confirm("Save changes to this historical game?")) return;

    const existingGame = S.allGames.find(g => Number(g.id) === Number(gameId)) || {};
    const existingPicks = S.allPicks.filter(p => p.game_id === gameId);
    const existingPick = (owner, slot) => existingPicks.find(p => p.owner === owner && Number(p.pick_slot) === slot) || {};

    const val = (id, fallback="") => {
      const el = document.getElementById(id);
      return el ? el.value : fallback;
    };
    const numVal = (id, fallback=0) => {
      const raw = val(id, fallback);
      return Number(String(raw || "0").replace(/\D/g, "") || 0);
    };

    const firstGoal = val(`editFirstGoal_${gameId}`, existingGame.first_goal_scorer || "");
    const a1 = val(`editA1_${gameId}`, existingPick("Aaron",1).player_name || "").trim();
    const a2 = val(`editA2_${gameId}`, existingPick("Aaron",2).player_name || "").trim();
    const j1 = val(`editJ1_${gameId}`, existingPick("Julie",1).player_name || "").trim();
    const j2 = val(`editJ2_${gameId}`, existingPick("Julie",2).player_name || "").trim();

    const a1g = numVal(`editA1G_${gameId}`, existingPick("Aaron",1).goals || 0);
    const a1a = numVal(`editA1A_${gameId}`, existingPick("Aaron",1).assists || 0);
    const a2g = numVal(`editA2G_${gameId}`, existingPick("Aaron",2).goals || 0);
    const a2a = numVal(`editA2A_${gameId}`, existingPick("Aaron",2).assists || 0);
    const j1g = numVal(`editJ1G_${gameId}`, existingPick("Julie",1).goals || 0);
    const j1a = numVal(`editJ1A_${gameId}`, existingPick("Julie",1).assists || 0);
    const j2g = numVal(`editJ2G_${gameId}`, existingPick("Julie",2).goals || 0);
    const j2a = numVal(`editJ2A_${gameId}`, existingPick("Julie",2).assists || 0);

    const a1pts = a1 ? pickPoints(a1, a1g, a1a, firstGoal) : 0;
    const a2pts = a2 ? pickPoints(a2, a2g, a2a, firstGoal) : 0;
    const j1pts = j1 ? pickPoints(j1, j1g, j1a, firstGoal) : 0;
    const j2pts = j2 ? pickPoints(j2, j2g, j2a, firstGoal) : 0;
    const aPts = a1pts + a2pts;
    const jPts = j1pts + j2pts;

    const patch = {
      game_date: val(`editDate_${gameId}`, existingGame.game_date || "") || null,
      opponent: val(`editOpponent_${gameId}`, existingGame.opponent || "") || null,
      game_type: val(`editType_${gameId}`, existingGame.game_type || "Regular Season"),
      first_picker: val(`editFirst_${gameId}`, existingGame.first_picker || "") || null,
      status: val(`editStatus_${gameId}`, existingGame.status || "Final"),
      first_goal_scorer: firstGoal || null,
      aaron_points: aPts,
      julie_points: jPts,
      winner: win(aPts, jPts),
      recap: `Edited historical record. Aaron ${aPts}, Julie ${jPts}.`
    };

    const upd = await db.from("games").update(patch).eq("id", gameId);
    if (upd.error) throw upd.error;

    if (a1) await upsertPick(gameId, "Aaron", 1, a1, a1g, a1a, a1pts);
    if (a2) await upsertPick(gameId, "Aaron", 2, a2, a2g, a2a, a2pts);
    if (j1) await upsertPick(gameId, "Julie", 1, j1, j1g, j1a, j1pts);
    if (j2) await upsertPick(gameId, "Julie", 2, j2, j2g, j2a, j2pts);

    S.editingGameId = null;
    S.editPanel = "result";
    await loadAll();
    toast("History updated.");
  } catch(e){
    toast(e.message || "Could not save history.");
  }
}


async function startNewSeason(){
  if (!(await requireAuth('start a new season'))) return;
  const key = prompt("New season key? Example: 2026-2027");
  if (!key) return;
  if (!confirm(`Start new season ${key}? This archives the current season totals and makes ${key} active.`)) return;

  const display = key.replace("-", "–");

  try{
    const currentTotals = totals();

    if (S.activeSeason){
      await db.from("seasons").update({
        aaron_final_total:currentTotals.a,
        julie_final_total:currentTotals.j,
        is_active:false
      }).eq("id", S.activeSeason.id);
    }

    const res = await db.from("seasons").upsert({
      season_key:key,
      display_name:display,
      is_active:true,
      aaron_final_total:0,
      julie_final_total:0,
      total_source:"active"
    }, {onConflict:"season_key"});

    if (res.error) throw res.error;

    S.selectedHistorySeasonId = null;
    await loadAll();
    toast("New season active.");
  } catch(e){
    toast(e.message || "Could not start season.");
  }
}

let lastAutoRefresh = 0;

async function autoRefresh(){
  const now = Date.now();
  if (now - lastAutoRefresh < 3000) return;
  lastAutoRefresh = now;
  try{
    await loadAll();
  } catch(e){
    console.warn("Auto-refresh failed", e);
  }
}

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) autoRefresh();
});

window.addEventListener("focus", autoRefresh);

window.addEventListener("pageshow", (event) => {
  if (event.persisted) autoRefresh();
});


db.auth.onAuthStateChange(async (_event, session) => {
  S.user = session?.user || null;
  renderAll();
});


function authCodeInputEnterHandler(){
  document.getElementById("authEmailInput")?.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendAuthCodeFromModal();
  });
  document.getElementById("authCodeInput")?.addEventListener("keydown", (e) => {
    if (e.key === "Enter") verifyAuthCodeFromModal();
  });
}

window.addEventListener("load", async () => {
  authCodeInputEnterHandler();
  try{
    await loadAll();
  } catch(e){
    document.getElementById("gameView").innerHTML = `
      <div class="hero">
        <div class="topline"><span>Setup issue</span></div>
        <h1>Error</h1>
        <div class="meta">${esc(e.message)}</div>
      </div>
    `;
  }
});
</script>
