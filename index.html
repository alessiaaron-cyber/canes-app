<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Canes Rivalry" />
  <meta name="theme-color" content="#f3f5f8" />
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Canes Rivalry</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --red:#c8102e;
      --ink:#101827;
      --muted:#667085;
      --bg:#f3f5f8;
      --card:#ffffff;
      --line:#e4e7ec;
      --black:#111827;
      --shadow:0 12px 30px rgba(16,24,40,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink)}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      padding:calc(10px + env(safe-area-inset-top)) 12px calc(88px + env(safe-area-inset-bottom));
    }
    .hero{
      background:linear-gradient(180deg,#ffffff 0%,#fbfcfe 100%);
      border:1px solid var(--line);
      border-radius:28px;
      padding:15px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero:before{
      content:"";
      position:absolute;
      top:0;left:0;right:0;
      height:6px;
      background:linear-gradient(90deg,var(--red),#111827,var(--red));
    }
    .hero.playoff-mode:before{
      height:8px;
      background:linear-gradient(90deg,#111827,var(--red),#111827,var(--red));
    }
    .topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      text-transform:uppercase;
      font-size:11px;
      font-weight:950;
      letter-spacing:.08em;
      margin-top:3px;
    }
    .top-actions{display:flex;align-items:center;gap:7px}
    .badge{
      background:var(--red);
      color:white;
      border-radius:999px;
      padding:6px 10px;
      font-weight:1000;
      font-size:11px;
      letter-spacing:.05em;
      white-space:nowrap;
    }
    .badge.playoff{
      background:linear-gradient(135deg,#111827,#c8102e);
      box-shadow:0 0 0 2px rgba(200,16,46,.12), 0 6px 15px rgba(200,16,46,.22);
    }
    .refresh-mini{
      width:auto;
      padding:6px 9px;
      border-radius:999px;
      background:#eef1f5;
      color:var(--ink);
      border:1px solid var(--line);
      box-shadow:none;
      font-size:11px;
      font-weight:1000;
      letter-spacing:.03em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    h1{
      text-align:center;
      margin:10px 0 4px;
      font-size:32px;
      line-height:.94;
      letter-spacing:-.06em;
      font-weight:1000;
    }
    .meta{
      text-align:center;
      color:var(--muted);
      font-weight:850;
      font-size:13px;
      line-height:1.3;
    }
    .scoreboard{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:13px;
    }
    .score-card{
      background:white;
      border:1px solid var(--line);
      border-radius:22px;
      text-align:center;
      padding:13px 8px 12px;
      box-shadow:0 6px 16px rgba(16,24,40,.045);
    }
    .name{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.09em;
      font-weight:1000;
      font-size:12px;
    }
    .bigscore{
      margin-top:5px;
      font-size:66px;
      line-height:.88;
      font-weight:1000;
      letter-spacing:-.085em;
    }
    .leader{
      margin-top:10px;
      background:var(--black);
      color:white;
      border-radius:18px;
      padding:11px 10px;
      text-align:center;
      font-size:16px;
      font-weight:1000;
      letter-spacing:.01em;
    }
    .leader.playoff-mode{background:linear-gradient(135deg,#111827,#7f1d1d)}
    .playoff-strip{
      margin-top:10px;
      background:#fff1f2;
      border:1px solid #fecdd3;
      color:#9f1239;
      border-radius:14px;
      padding:8px 10px;
      text-align:center;
      font-size:12px;
      font-weight:1000;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:14px;
      margin-top:12px;
      box-shadow:0 8px 22px rgba(16,24,40,.045);
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .section-title{
      font-size:16px;
      font-weight:1000;
      letter-spacing:-.025em;
    }
    .mini{
      color:var(--muted);
      font-size:12px;
      font-weight:850;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .panel{
      background:#fbfcfe;
      border:1px solid var(--line);
      border-radius:19px;
      padding:11px;
    }
    .panel-title{
      margin:0 0 8px;
      font-size:15px;
      font-weight:1000;
      letter-spacing:-.02em;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    label{
      display:block;
      margin:8px 0 4px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:10px;
      font-weight:1000;
    }
    select,input{
      width:100%;
      min-height:42px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      color:var(--ink);
      padding:9px 8px;
      font-size:14px;
      font-weight:850;
      outline:none;
    }
    input[type=number]{
      text-align:center;
      font-size:17px;
      padding-left:2px;
      padding-right:2px;
    }
    .stat-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 44px 44px;
      gap:7px;
      align-items:end;
      margin-top:8px;
    }
    .player-mini{
      font-size:12px;
      font-weight:1000;
      color:#344054;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding-bottom:11px;
    }
    .live-score{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .live-box{
      background:#fbfcfe;
      border:1px solid var(--line);
      border-radius:20px;
      text-align:center;
      padding:13px 8px 11px;
    }
    .live-num{
      font-size:44px;
      line-height:.9;
      font-weight:1000;
      letter-spacing:-.06em;
    }
    .live-label{
      margin-top:6px;
      color:var(--muted);
      font-size:11px;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.07em;
    }
    button{
      width:100%;
      border:0;
      border-radius:18px;
      padding:15px 12px;
      background:var(--red);
      color:white;
      font-size:17px;
      font-weight:1000;
      box-shadow:0 10px 22px rgba(200,16,46,.22);
    }
    button.secondary{background:var(--black);box-shadow:none}
    button.light{
      background:white;
      color:var(--ink);
      border:1px solid var(--line);
      box-shadow:none;
      padding:12px 9px;
      font-size:13px;
    }
    button.tiny-btn{
      width:auto;
      padding:7px 9px;
      border-radius:11px;
      font-size:11px;
      box-shadow:none;
      background:#111827;
    }
    button.dangerish{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    button:disabled{opacity:.55}
    .tabs{
      position:fixed;
      left:0;right:0;bottom:0;
      z-index:10;
      display:flex;
      justify-content:center;
      padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(16px);
      border-top:1px solid var(--line);
    }
    .tabs-inner{
      max-width:430px;
      width:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }
    .tab{
      padding:10px 4px;
      border-radius:15px;
      background:#eef1f5;
      color:var(--ink);
      box-shadow:none;
      font-size:12px;
      font-weight:1000;
    }
    .tab.active{background:var(--black);color:white}
    .hidden{display:none}
    .row-card{
      background:white;
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      margin-bottom:9px;
      box-shadow:0 5px 14px rgba(16,24,40,.035);
    }
    .row-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      font-weight:1000;
    }
    .row-sub{
      color:#344054;
      font-size:12px;
      font-weight:750;
      line-height:1.45;
    }
    .card-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .edit-form{
      margin-top:10px;
      border-top:1px solid var(--line);
      padding-top:10px;
    }
    .edit-form .manage-fields{
      margin-top:6px;
    }
    .total-only{
      text-align:center;
      padding:16px 12px;
      color:var(--muted);
      font-weight:850;
      line-height:1.4;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:8px;
    }
    .manage-list{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .manage-item{
      border:1px solid var(--line);
      background:#fff;
      border-radius:15px;
      padding:10px;
    }
    .manage-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-weight:1000;
      font-size:13px;
      margin-bottom:6px;
    }
    .manage-fields{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
    }
    .manage-fields.full{grid-template-columns:1fr}
    .note{
      margin-top:9px;
      color:var(--muted);
      font-size:12px;
      font-weight:750;
      line-height:1.35;
    }
    .danger{
      margin-top:10px;
      color:#991b1b;
      background:#fee2e2;
      border:1px solid #fecaca;
      border-radius:15px;
      padding:10px;
      font-size:12px;
      font-weight:850;
      line-height:1.35;
    }
    .instruction-box{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:11px;
      font-size:12px;
      line-height:1.42;
      color:#344054;
      font-weight:750;
    }
    .instruction-box strong{color:#111827}
    .loader{
      padding:35px 20px;
      text-align:center;
      color:var(--muted);
      font-weight:950;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:90px;
      transform:translateX(-50%);
      z-index:20;
      max-width:90vw;
      background:var(--black);
      color:white;
      border-radius:999px;
      padding:11px 15px;
      font-size:13px;
      font-weight:950;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
    }
    .toast.show{opacity:1}
  .rivalry-board{
      background:linear-gradient(180deg,#ffffff 0%,#fbfcfe 100%);
      border:1px solid var(--line);
      border-radius:24px;
      padding:14px;
      margin-top:12px;
      box-shadow:0 10px 24px rgba(16,24,40,.06);
      overflow:hidden;
      position:relative;
    }
    .rivalry-board:before{
      content:"";
      position:absolute;
      left:0;right:0;top:0;
      height:5px;
      background:linear-gradient(90deg,var(--red),#111827,var(--red));
    }
    .rivalry-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:4px 0 12px;
    }
    .rivalry-title-main{
      font-size:20px;
      font-weight:1000;
      letter-spacing:-.035em;
    }
    .rivalry-title-tag{
      background:#111827;
      color:white;
      border-radius:999px;
      padding:6px 9px;
      font-size:10px;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.07em;
      white-space:nowrap;
    }
    .headline-stat{
      background:linear-gradient(135deg,#111827 0%,#1f2937 52%,#c8102e 130%);
      color:white;
      border-radius:22px;
      padding:15px;
      box-shadow:0 10px 22px rgba(17,24,39,.18);
      margin-bottom:10px;
    }
    .headline-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }
    .headline-icon{
      font-size:29px;
      line-height:1;
    }
    .headline-label{
      color:rgba(255,255,255,.72);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:10px;
      font-weight:1000;
      margin-bottom:6px;
    }
    .headline-value{
      font-size:38px;
      line-height:.95;
      font-weight:1000;
      letter-spacing:-.06em;
    }
    .headline-sub{
      color:rgba(255,255,255,.78);
      font-size:12px;
      font-weight:800;
      line-height:1.3;
      margin-top:8px;
    }
    .stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:10px;
    }
    .stat-tile{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:11px 10px;
      min-height:98px;
      box-shadow:0 6px 15px rgba(16,24,40,.04);
      position:relative;
      overflow:hidden;
    }
    .stat-tile:before{
      content:"";
      position:absolute;
      left:0;top:0;bottom:0;
      width:4px;
      background:var(--red);
      opacity:.9;
    }
    .stat-tile.alt:before{
      background:#111827;
    }
    .stat-row-icon{
      display:flex;
      align-items:center;
      gap:7px;
      margin-bottom:8px;
    }
    .stat-icon{
      width:30px;
      height:30px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3f5f8;
      font-size:17px;
      flex:0 0 30px;
    }
    .stat-label{
      color:var(--muted);
      font-size:9px;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.075em;
      line-height:1.1;
    }
    .stat-value{
      font-size:23px;
      font-weight:1000;
      line-height:1;
      letter-spacing:-.045em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .stat-sub{
      margin-top:5px;
      color:#667085;
      font-size:11px;
      font-weight:800;
      line-height:1.25;
    }
    .ticker{
      margin-top:12px;
      border:1px solid #fecaca;
      border-radius:17px;
      background:linear-gradient(180deg,#fff7f7,#ffffff);
      padding:11px;
      font-size:12px;
      font-weight:850;
      color:#344054;
      line-height:1.38;
    }
    .ticker strong{
      color:var(--red);
      font-weight:1000;
    }
  
    /* Mobile form fix: prevent Date/Opponent overlap in Manage and History edit forms */
    .manage-fields{
      grid-template-columns:1fr !important;
      gap:12px !important;
    }
    .manage-item .manage-fields,
    .section .manage-fields{
      grid-template-columns:1fr !important;
    }
    .manage-fields input,
    .manage-fields select{
      min-width:0;
      width:100%;
    }

  
    /* Width polish: use more of the iPhone screen */
    .app{
      max-width:none !important;
      width:100% !important;
      padding-left:8px !important;
      padding-right:8px !important;
    }
    .tabs-inner{
      max-width:none !important;
      width:100% !important;
    }

    /* iOS date/input fix: keep fields inside cards */
    input, select{
      max-width:100% !important;
      min-width:0 !important;
      box-sizing:border-box !important;
    }
    input[type="date"]{
      width:100% !important;
      max-width:100% !important;
      min-width:0 !important;
      display:block !important;
      -webkit-appearance:none;
      appearance:none;
    }
    .manage-item,
    .section,
    .hero{
      max-width:100% !important;
      overflow:hidden;
    }
    .manage-fields > div{
      min-width:0 !important;
      width:100% !important;
    }

  
    /* Final Game Day full-width polish */
    body{
      overflow-x:hidden !important;
    }
    .app{
      max-width:none !important;
      width:100vw !important;
      padding-left:6px !important;
      padding-right:6px !important;
      padding-top:calc(4px + env(safe-area-inset-top)) !important;
    }
    #gameView,
    #historyView,
    #alltimeView,
    #manageView{
      width:100% !important;
    }
    #gameView .hero,
    #gameView .section{
      width:100% !important;
      max-width:none !important;
      margin-left:0 !important;
      margin-right:0 !important;
    }
    #gameView .hero{
      border-radius:24px !important;
      padding-left:12px !important;
      padding-right:12px !important;
    }
    #gameView .section{
      border-radius:22px !important;
      padding-left:12px !important;
      padding-right:12px !important;
    }
    #gameView .scoreboard{
      gap:8px !important;
    }
    #gameView .score-card{
      padding-left:6px !important;
      padding-right:6px !important;
    }
    #gameView .bigscore{
      font-size:clamp(58px, 18vw, 78px) !important;
    }
    #gameView h1{
      font-size:clamp(34px, 10vw, 46px) !important;
      margin-top:8px !important;
    }
    #gameView .panel{
      padding-left:10px !important;
      padding-right:10px !important;
    }
    .tabs{
      padding-left:6px !important;
      padding-right:6px !important;
    }
    .tabs-inner{
      max-width:none !important;
      width:100% !important;
    }

  
    /* Game Day visual scale fix: make it feel like the other tabs, not tiny bubbles */
    #gameView{
      padding:0 !important;
      margin:0 !important;
    }

    #gameView .hero,
    #gameView .section{
      width:100% !important;
      margin-left:0 !important;
      margin-right:0 !important;
      border-radius:26px !important;
      padding:16px 14px !important;
      box-shadow:0 12px 30px rgba(16,24,40,.075) !important;
    }

    #gameView .hero{
      min-height:0 !important;
      padding-top:18px !important;
      padding-bottom:18px !important;
    }

    #gameView h1{
      font-size:46px !important;
      line-height:.95 !important;
      margin:12px 0 6px !important;
      letter-spacing:-.07em !important;
    }

    #gameView .meta{
      font-size:16px !important;
      font-weight:900 !important;
    }

    #gameView .playoff-strip{
      margin-top:14px !important;
      padding:12px 10px !important;
      font-size:13px !important;
      border-radius:18px !important;
    }

    #gameView .scoreboard{
      gap:12px !important;
      margin-top:16px !important;
    }

    #gameView .score-card{
      border-radius:24px !important;
      padding:18px 8px 16px !important;
      min-height:150px !important;
      display:flex !important;
      flex-direction:column !important;
      align-items:center !important;
      justify-content:center !important;
    }

    #gameView .name{
      font-size:14px !important;
      letter-spacing:.12em !important;
      margin-bottom:8px !important;
    }

    #gameView .bigscore{
      font-size:86px !important;
      line-height:.82 !important;
      letter-spacing:-.09em !important;
    }

    #gameView .leader{
      margin-top:14px !important;
      padding:15px 12px !important;
      border-radius:22px !important;
      font-size:20px !important;
    }

    #gameView .section-head{
      margin-bottom:14px !important;
    }

    #gameView .section-title{
      font-size:22px !important;
      letter-spacing:-.04em !important;
    }

    #gameView .mini{
      font-size:15px !important;
      font-weight:950 !important;
    }

    #gameView .panel{
      border-radius:24px !important;
      padding:16px 14px !important;
      min-height:190px !important;
      display:flex !important;
      flex-direction:column !important;
      justify-content:center !important;
    }

    #gameView .panel-title{
      font-size:22px !important;
      margin-bottom:12px !important;
    }

    #gameView label{
      font-size:12px !important;
      letter-spacing:.09em !important;
      margin-top:10px !important;
      margin-bottom:6px !important;
    }

    #gameView select,
    #gameView input{
      min-height:56px !important;
      border-radius:20px !important;
      font-size:19px !important;
      padding:12px 14px !important;
      font-weight:950 !important;
    }

    #gameView input[type=number]{
      font-size:24px !important;
      padding-left:4px !important;
      padding-right:4px !important;

function pushSupported(){
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;
}

function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function enablePushNotifications(){
  if (!(await requireAuth("enable notifications"))) return;
  if (!pushSupported()) return toast("Push notifications are not supported on this device/browser.");

  try{
    const permission = await Notification.requestPermission();
    if (permission !== "granted") return toast("Notifications were not allowed.");

    const reg = await navigator.serviceWorker.register("service-worker.js");
    const ready = await navigator.serviceWorker.ready;

    let sub = await ready.pushManager.getSubscription();
    if (!sub){
      sub = await ready.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }

    const jsonSub = sub.toJSON();
    const row = {
      user_email:S.user?.email || "",
      endpoint:jsonSub.endpoint,
      p256dh:jsonSub.keys?.p256dh,
      auth:jsonSub.keys?.auth,
      last_seen_at:new Date().toISOString()
    };

    if (!row.user_email || !row.endpoint || !row.p256dh || !row.auth){
      throw new Error("Device subscription was incomplete.");
    }

    const res = await db.from("push_subscriptions").upsert(row, { onConflict:"endpoint" });
    if (res.error) throw new Error(friendlyDbError(res.error));

    haptic("success");
    toast("Notifications enabled on this device.");
    renderManage();
  } catch(e){
    toast(e.message || "Could not enable notifications.");
  }
}

function pushUiPickChange({owner, slot, oldRow, player, goals, assists, points, key}){
  if (!S.currentGame?.id || !player) return;

  const oldPlayer = oldRow?.player_name || "";
  const oldGoals = Number(oldRow?.goals || 0);
  const oldAssists = Number(oldRow?.assists || 0);
  const oldPoints = Number(oldRow?.points || 0);

  const playerChanged = oldPlayer !== player;
  const statChanged = oldGoals !== Number(goals || 0) || oldAssists !== Number(assists || 0) || oldPoints !== Number(points || 0);

  if (["a1","a2","j1","j2"].includes(key)){
    if (!playerChanged) return;
    sendPushNotification(
      "Canes Rivalry Pick",
      `${owner} picked ${lastNameLabel(player)}.`,
      `ui-pick-${S.currentGame.id}-${owner}-${slot}-${player}`
    );
    return;
  }

  if (!statChanged) return;

  const statBits = [];
  if (oldGoals !== Number(goals || 0)) statBits.push(`${Number(goals || 0)}G`);
  if (oldAssists !== Number(assists || 0)) statBits.push(`${Number(assists || 0)}A`);
  if (!statBits.length) statBits.push(`${Number(points || 0)} pts`);

  const delta = Number(points || 0) - oldPoints;
  sendPushNotification(
    "Rivalry Stat Update",
    `${owner}'s ${shortPlayerName(player)} updated: ${statBits.join(" ")} (${delta >= 0 ? "+" : ""}${delta}).`,
    `ui-stat-${S.currentGame.id}-${owner}-${slot}-${Number(goals || 0)}-${Number(assists || 0)}-${Number(points || 0)}`
  );
}

function mergeRow(list, row){
  const idx = list.findIndex(x => x.id === row.id);
  if (idx >= 0) list[idx] = {...list[idx], ...row};
  else list.push(row);
}

function removeDeletedRow(list, oldRow){
  const idx = list.findIndex(x => x.id === oldRow.id);
  if (idx >= 0) list.splice(idx, 1);
}

function applyRealtimePayload(payload){
  if (!S.currentGame) return;
  const table = payload.table;
  const row = payload.new;
  const oldRow = payload.old;

  if (payload.eventType !== "DELETE" && shouldIgnoreRealtimeEcho(table, row)) return;

  if (table === "games"){
    const targetId = row?.id || oldRow?.id;
    if (targetId !== S.currentGame.id) return;

    if (payload.eventType === "DELETE"){
      removeDeletedRow(S.games, oldRow);
      removeDeletedRow(S.allGames, oldRow);
      return;
    }

    mergeRow(S.games, row);
    mergeRow(S.allGames, row);
    S.currentGame = {...S.currentGame, ...row};

    const changed = [];
    if (oldRow && row && oldRow.first_goal_scorer !== row.first_goal_scorer) changed.push("firstGoal");
    markUpdated(changed);

    if (!isGameDayEditingActive()){
      hydrateForm();
      renderAll();
    } else {
      S.needsGameRender = true;
      S.needsGameHydrate = true;
      renderHistory();
      renderAllTime();
      renderManage();
    }
  }

  if (table === "picks"){
    const gameId = row?.game_id || oldRow?.game_id;
    if (gameId !== S.currentGame.id) return;

    if (payload.eventType === "DELETE"){
      removeDeletedRow(S.picks, oldRow);
      removeDeletedRow(S.allPicks, oldRow);
      return;
    }

    mergeRow(S.picks, row);
    mergeRow(S.allPicks, row);

    const pickKey = row.owner === "Aaron" ? (Number(row.pick_slot) === 1 ? "a1" : "a2") : (Number(row.pick_slot) === 1 ? "j1" : "j2");
    const statKeys = row.owner === "Aaron"
      ? (Number(row.pick_slot) === 1 ? ["ag1","aa1"] : ["ag2","aa2"])
      : (Number(row.pick_slot) === 1 ? ["jg1","ja1"] : ["jg2","ja2"]);
    markUpdated([pickKey, ...statKeys]);

    if (!isGameDayEditingActive()){
      hydrateForm();
      renderAll();
    } else {
      S.needsGameRender = true;
      S.needsGameHydrate = true;
      renderHistory();
      renderAllTime();
      renderManage();
    }
  }
}

async function saveCurrentGameField(field, value){

    if (res.error){
      toast(res.error.message || "Could not save.");

    markLocalWrite("games", { id: S.currentGame.id });
    S.currentGame = {...S.currentGame, ...patch};
    mergeRow(S.games, S.currentGame);
    mergeRow(S.allGames, S.currentGame);
    markUpdated([field === "first_goal_scorer" ? "firstGoal" : field]);
    if (field === "first_goal_scorer" && oldValue !== newValue && newValue){

  }
}

function esc(x){
  return (x ?? "").toString().replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function win(a,j){
  return Number(a)>Number(j) ? "Aaron" : Number(j)>Number(a) ? "Julie" : "Tie";
}

function pickPoints(player, goals, assists, firstGoal){
  goals = Number(goals || 0);
  assists = Number(assists || 0);
  let pts = goals * 2 + assists;
  if (player && firstGoal && player === firstGoal && goals > 0) pts += 1;
  return pts;
}

function parseGameDateLocal(dateStr){
  if (!dateStr) return null;
  const raw = String(dateStr).trim();
  const m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  const d = new Date(raw);
  return Number.isNaN(d.getTime()) ? null : d;
}

function formatGameDate(dateStr){
  const d = parseGameDateLocal(dateStr);
  if (!d) return "";

  const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate());
  const dayMs = 24 * 60 * 60 * 1000;
  const diffDays = Math.round((startOfDay(d) - startOfDay(new Date())) / dayMs);

  if (diffDays === 0) return "Today";
  if (diffDays === 1) return "Tomorrow";

  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function normalizePlayerNameForMatch(name){
  return String(name || "")
    .toLowerCase()
    .replace(/,/g, " ")
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function playerNameMatchKeys(name){
  const normal = normalizePlayerNameForMatch(name);
  const parts = normal.split(" ").filter(Boolean);
  return {
    normal,
    sorted: [...parts].sort().join(" "),
    last: parts.length ? parts[parts.length - 1] : ""
  };
}

function findSyncedPlayerStat(playerName, playerStats){
  const target = playerNameMatchKeys(playerName);
  if (!target.normal) return null;

  const stats = (playerStats || []).map(s => ({
    ...s,
    _keys: playerNameMatchKeys(s.playerName)
  }));

  // 1) Exact normalized full-name match.
  let match = stats.find(s => s._keys.normal === target.normal);
  if (match) return match;

  // 2) Token-sorted match catches "Aho, Sebastian" vs "Sebastian Aho".
  match = stats.find(s => s._keys.sorted && s._keys.sorted === target.sorted);
  if (match) return match;

  // 3) Last-name fallback, but only if the NHL scorer last name is unique.
  if (target.last){
    const lastMatches = stats.filter(s => s._keys.last === target.last);
    if (lastMatches.length === 1) return lastMatches[0];
  }

  return null;
}

function canonicalRosterNameForSyncedName(name){
  if (!name) return "";
  const names = playerNames();
  const fakeStat = [{ playerName: name, goals: 0, assists: 0 }];
  return names.find(n => findSyncedPlayerStat(n, fakeStat)) || name;
}

async function syncNhlStats(){
  if (!(await requireAuth("sync NHL stats"))) return;
  const g = S.currentGame;
  if (!g?.id) return toast("No current game to sync.");
  if (!g.game_date && !g.nhl_game_id) return toast("Add a game date first so NHL sync can find the game.");

  beginSave();
  try{
    const { data, error } = await db.functions.invoke("sync-nhl-game", {
      body: {
        nhl_game_id: g.nhl_game_id || null,
        game_date: g.game_date || null,
        opponent: g.opponent || null
      }
    });

    if (error) throw new Error(error.message || "NHL sync failed.");
    if (!data?.ok) throw new Error(data?.error || "NHL sync could not find game stats.");

    const stats = Array.isArray(data.playerStats) ? data.playerStats : [];
    const syncedFirstGoal = data.firstCanesGoalScorer || data.firstGoalScorer || "";
    const firstGoal = canonicalRosterNameForSyncedName(syncedFirstGoal) || S.form.firstGoal || "";

    const getGA = (player) => {
      const stat = findSyncedPlayerStat(player, stats);
      return {
        goals: Number(stat?.goals || 0),
        assists: Number(stat?.assists || 0),
        matched: !!stat,
        nhlName: stat?.playerName || ""
      };
    };

    const a1 = getGA(S.form.a1);
    const a2 = getGA(S.form.a2);
    const j1 = getGA(S.form.j1);
    const j2 = getGA(S.form.j2);
    const matchedPicks = [a1,a2,j1,j2].filter(x => x.matched && (x.goals || x.assists)).length;

    const syncedForm = {
      ...S.form,
      ag1:a1.goals, aa1:a1.assists,
      ag2:a2.goals, aa2:a2.assists,
      jg1:j1.goals, ja1:j1.assists,
      jg2:j2.goals, ja2:j2.assists,
      firstGoal
    };

    S.form = syncedForm;

    await upsertPick(g.id,"Aaron",1,syncedForm.a1,syncedForm.ag1,syncedForm.aa1,pickPoints(syncedForm.a1,syncedForm.ag1,syncedForm.aa1,syncedForm.firstGoal));
    await upsertPick(g.id,"Aaron",2,syncedForm.a2,syncedForm.ag2,syncedForm.aa2,pickPoints(syncedForm.a2,syncedForm.ag2,syncedForm.aa2,syncedForm.firstGoal));
    await upsertPick(g.id,"Julie",1,syncedForm.j1,syncedForm.jg1,syncedForm.ja1,pickPoints(syncedForm.j1,syncedForm.jg1,syncedForm.ja1,syncedForm.firstGoal));
    await upsertPick(g.id,"Julie",2,syncedForm.j2,syncedForm.jg2,syncedForm.ja2,pickPoints(syncedForm.j2,syncedForm.jg2,syncedForm.ja2,syncedForm.firstGoal));

    const patch = {
      nhl_game_id: data.nhl_game_id || g.nhl_game_id || null,
      last_synced_at: data.syncedAt || new Date().toISOString(),
      game_start_time: data.gameStartTime || g.game_start_time || null,
      nhl_game_state: data.gameState || g.nhl_game_state || null,
      first_goal_scorer: syncedForm.firstGoal || null,
      status: g.status === "Scheduled" ? "In Progress" : g.status
    };

    const upd = await db.from("games").update(patch).eq("id", g.id);
    if (upd.error) throw new Error(friendlyDbError(upd.error));

    markLocalWrite("games", { id:g.id });
    S.currentGame = {...S.currentGame, ...patch};
    mergeRow(S.games, S.currentGame);
    mergeRow(S.allGames, S.currentGame);

    renderGame();
    renderHistory();
    renderAllTime();
    renderManage();
    haptic("success");
    const firstGoalNote = firstGoal ? ` First Canes goal: ${lastNameLabel(firstGoal)}.` : "";
    toast(`NHL sync updated ${matchedPicks} picked player${matchedPicks === 1 ? "" : "s"}.${firstGoalNote}`);
  } catch(e){
    toast(e.message || "Could not sync NHL stats.");
  } finally {
    endSave();
  }
}

function liveScore(){

  const a =
    pickPoints(f.a1,f.ag1,f.aa1,f.firstGoal) +
    pickPoints(f.a2,f.ag2,f.aa2,f.firstGoal);
  const j =
    pickPoints(f.j1,f.jg1,f.ja1,f.firstGoal) +
    pickPoints(f.j2,f.jg2,f.ja2,f.firstGoal);
  return {a,j,w:win(a,j)};
}

function totals(){
  const finals = S.games.filter(g => g.status === "Final");
  return {
    a: finals.reduce((n,g) => n + Number(g.aaron_points || 0), 0),
    j: finals.reduce((n,g) => n + Number(g.julie_points || 0), 0)
  };
}

function lastNameLabel(name){
  const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
  if (parts.length < 2) return name || "";
  const last = parts.pop();
  return `${last}, ${parts.join(" ")}`;
}

function lastNameSortValue(name){
  const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
  return parts.length ? parts[parts.length - 1] : "";
}

function playerNames(){
  return [...new Set(S.players.map(p => p.player_name).filter(Boolean))].sort((a,b) => {
    const lastCompare = lastNameSortValue(a).localeCompare(lastNameSortValue(b));
    return lastCompare || a.localeCompare(b);
  });
}




function selectedPickMap(){
  return {
    a1: S.form.a1 || "",
    a2: S.form.a2 || "",
    j1: S.form.j1 || "",
    j2: S.form.j2 || ""
  };
}

function isPlayerAlreadyPicked(player, currentSlot){
  if (!player) return false;
  const picks = selectedPickMap();
  return Object.entries(picks).some(([slot, value]) => slot !== currentSlot && value === player);
}

function findDuplicatePick(slot, player){
  if (!player) return null;
  const labels = {a1:"Aaron Pick 1", a2:"Aaron Pick 2", j1:"Julie Pick 1", j2:"Julie Pick 2"};
  const picks = selectedPickMap();
  const dupe = Object.entries(picks).find(([s,v]) => s !== slot && v === player);
  return dupe ? labels[dupe[0]] : null;
}

function playerOptions(selected, currentSlot){
  const names = playerNames();
  if (!names.length) return `<option value="">No active players</option>`;
  return `<option value="">Select</option>` + names.map(p => {
    const disabled = isPlayerAlreadyPicked(p, currentSlot) && p !== selected;
    return `<option value="${esc(p)}" ${p===selected ? "selected" : ""} ${disabled ? "disabled" : ""}>${esc(lastNameLabel(p))}${disabled ? " — picked" : ""}</option>`;
  }).join("");
}

function firstGoalOptions(){
  const vals = playerNames();
  if (!vals.length) return `<option value="">No active players</option>`;
  return `<option value="">No first goal selected</option>` + vals.map(p =>
    `<option value="${esc(p)}" ${p===S.form.firstGoal ? "selected" : ""}>${esc(lastNameLabel(p))}</option>`
  ).join("");
}

function setF(k,v){
  if (["a1","a2","j1","j2"].includes(k)){
    const dupe = findDuplicatePick(k, v);
    if (dupe){
      toast(`${v} is already picked in ${dupe}.`);
      haptic();
      renderGame();
      return;
    }
  }

  S.form[k] = v;
  renderGame();

  if (["a1","a2","j1","j2"].includes(k)){
    saveDraftPick(k);
  }

  if (k === "firstGoal"){
    saveCurrentGameField("first_goal_scorer", v);
    ["a1","a2","j1","j2"].forEach(saveDraftPick);
  }
}

function setNum(k,v){
  const clean = String(v || "0").replace(/\D/g, "");
  S.form[k] = Math.max(0, Number(clean || 0));
  renderGame();
  saveDraftPick(k);
}

async function loadAll(){
  await refreshAuth();
  const seasons = await db.from("seasons").select("*").order("season_key");
  if (seasons.error) throw seasons.error;

  S.seasons = seasons.data || [];
  S.activeSeason = S.seasons.find(s => s.is_active) || S.seasons[S.seasons.length - 1];
  if (!S.activeSeason) throw new Error("No active season found.");
  if (!S.selectedHistorySeasonId) S.selectedHistorySeasonId = S.activeSeason.id;

  const [allGames, activeGames, players] = await Promise.all([
    db.from("games").select("*").order("game_number"),
    db.from("games").select("*").eq("season_id", S.activeSeason.id).order("game_number"),
    db.from("players").select("*").order("player_name")
  ]);

  if (allGames.error) throw allGames.error;
  if (activeGames.error) throw activeGames.error;

  S.allGames = allGames.data || [];
  S.games = activeGames.data || [];
  S.allPlayers = players.data || [];
  S.players = S.allPlayers.filter(p => p.is_active !== false);

  if (S.allGames.length){
    const ids = S.allGames.map(g => g.id);
    const picks = await db.from("picks").select("*").in("game_id", ids).order("pick_slot");
    if (picks.error) throw picks.error;
    S.allPicks = picks.data || [];
    S.picks = S.allPicks.filter(p => S.games.some(g => g.id === p.game_id));
  } else {
    S.allPicks = [];
    S.picks = [];
  }

  S.currentGame = S.games.find(g => g.status !== "Final" && g.status !== "Hidden");
  if (!S.currentGame) await createNextGame();

  hydrateForm();
  await setupRealtime();
  renderAll();
}

function computeFunStats(){
  const finals = S.allGames.filter(g => g.status === "Final");
  const activeFinals = S.games.filter(g => g.status === "Final");
  const sortedActive = [...activeFinals].sort((a,b)=>Number(a.game_number)-Number(b.game_number));
  const sortedAll = [...finals].sort((a,b)=>{
    const da = String(a.game_date || "");
    const db = String(b.game_date || "");
    if (da !== db) return da.localeCompare(db);
    return Number(a.game_number || 0) - Number(b.game_number || 0);
  });

  let currentStreak = "—";
  let currentStreakOwner = "";
  let currentStreakCount = 0;
  if (sortedActive.length){
    const lastWinner = sortedActive[sortedActive.length-1].winner;
    if (lastWinner && lastWinner !== "Tie"){
      for (let i=sortedActive.length-1; i>=0; i--){
        if (sortedActive[i].winner === lastWinner) currentStreakCount++;
        else break;
      }
      currentStreakOwner = lastWinner;
      currentStreak = `${lastWinner} W${currentStreakCount}`;
    } else currentStreak = "No streak";
  }

  let headlineSub = "Once more games go final, the booth will find the storyline.";
  if (currentStreak === "No streak"){
    headlineSub = "Nobody owns momentum. The booth is calling this one chaos.";
  } else if (currentStreakOwner){
    if (currentStreakCount >= 4) headlineSub = `${currentStreakOwner} is fully in villain mode. The chirping is justified.`;
    else if (currentStreakCount >= 2) headlineSub = `${currentStreakOwner} has momentum. This is officially a storyline.`;
    else headlineSub = "Momentum is officially a storyline. Expect chirping.";
  }

  let longest = {winner:"—", count:0};
  let current = {winner:null, count:0};
  sortedActive.forEach(g=>{
    if (!g.winner || g.winner === "Tie"){
      current = {winner:null, count:0};
    } else if (g.winner === current.winner){
      current.count++;
    } else {
      current = {winner:g.winner, count:1};
    }
    if (current.count > longest.count) longest = {...current};
  });

  const biggest = finals.reduce((best,g)=>{
    const margin = Math.abs(Number(g.aaron_points||0)-Number(g.julie_points||0));
    return margin > best.margin ? {game:g, margin} : best;
  }, {game:null, margin:0});

  const bestScore = finals.reduce((best,g)=>{
    const a = Number(g.aaron_points||0);
    const j = Number(g.julie_points||0);
    const maxScore = Math.max(a, j);
    const winner = a === j ? "Tie" : a > j ? "Aaron" : "Julie";
    return maxScore > best.score ? {game:{...g, winner}, score:maxScore} : best;
  }, {game:null, score:0});

  const pickCounts = {};
  const pickPointsMap = {};
  const ownerPickMap = {};
  S.allPicks.forEach(p=>{
    const name = p.player_name;
    if (!name) return;
    const pts = Number(p.points || 0);
    pickCounts[name] = (pickCounts[name] || 0) + 1;
    pickPointsMap[name] = (pickPointsMap[name] || 0) + pts;

    const owner = p.owner || "";
    if (owner){
      const key = `${owner}|${name}`;
      if (!ownerPickMap[key]) ownerPickMap[key] = {owner, name, count:0, points:0};
      ownerPickMap[key].count++;
      ownerPickMap[key].points += pts;
    }
  });

  const mostPicked = Object.entries(pickCounts).sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))[0];
  const bestAvg = Object.keys(pickCounts)
    .map(name=>({name, avg: pickPointsMap[name] / pickCounts[name], count: pickCounts[name]}))
    .filter(x=>x.count >= 2 && x.avg > 0)
    .sort((a,b)=>b.avg-a.avg || b.count-a.count || a.name.localeCompare(b.name))[0];

  const clutchPick = Object.values(ownerPickMap)
    .map(x=>({...x, avg:x.points / x.count}))
    .filter(x=>x.count >= 2 && x.avg > 0)
    .sort((a,b)=>b.avg-a.avg || b.count-a.count || a.name.localeCompare(b.name))[0];

  const firstGoals = {};
  finals.forEach(g=>{
    if (g.first_goal_scorer) firstGoals[g.first_goal_scorer] = (firstGoals[g.first_goal_scorer] || 0) + 1;
  });
  const topFirstGoal = Object.entries(firstGoals).sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))[0];

  const lastFinal = sortedAll[sortedAll.length - 1];
  let boothNote = "Once more games are finalized, this turns into your rivalry storyline machine.";
  if (lastFinal){
    const lastMargin = Math.abs(Number(lastFinal.aaron_points||0)-Number(lastFinal.julie_points||0));
    if (lastFinal.winner && lastFinal.winner !== "Tie" && lastMargin >= 5){
      boothNote = `${lastFinal.winner} just dropped a statement win, and the booth has no choice but to respect the scoreboard.`;
    } else if (biggest.game && mostPicked){
      boothNote = `${biggest.game.winner} owns the biggest statement win so far, while ${mostPicked[0]} keeps showing up in the strategy room.`;
    } else if (mostPicked){
      boothNote = `${mostPicked[0]} is becoming the default strategy-room name.`;
    }
  }

  return {currentStreak, currentStreakOwner, currentStreakCount, headlineSub, longest, biggest, bestScore, mostPicked, bestAvg, clutchPick, topFirstGoal, boothNote};
}

async function createNextGame(){
  const maxNum = S.games.reduce((m,g) => Math.max(m, Number(g.game_number || 0)), 0);
  const nextNum = maxNum + 1;
  const firstPicker = nextNum % 2 ? "Julie" : "Aaron";
  const gameType = nextNum <= 82 ? "Regular Season" : "Playoffs";

  const ins = await db.from("games").insert({
    season_id:S.activeSeason.id,
    game_number:nextNum,
    game_type:gameType,
    opponent:"Next Game",
    first_picker:firstPicker,
    status:"Scheduled",
    aaron_points:0,
    julie_points:0
  }).select().single();

  if (ins.error) throw ins.error;
  S.currentGame = ins.data;
  S.games.push(ins.data);
  S.allGames.push(ins.data);
}

async function upsertPick(gameId, owner, slot, player, goals, assists, points){
  const existing = S.allPicks.find(p => p.game_id===gameId && p.owner===owner && Number(p.pick_slot)===slot);

  const row = {
    game_id:gameId,
    owner,
    pick_slot:slot,
    player_name:player || "",
    goals:Number(goals||0),
    assists:Number(assists||0),
    points:Number(points||0),
    is_carry_forward:false,
    original_pick_text:player || ""
  };

  let savedRow;
  if (existing){
    const res = await db.from("picks").update(row).eq("id", existing.id).select().single();
    if (res.error) throw new Error(friendlyDbError(res.error));
    savedRow = res.data || {...existing, ...row};
  } else {
    const res = await db.from("picks").insert(row).select().single();
    if (res.error) throw new Error(friendlyDbError(res.error));
    savedRow = res.data || row;
  }

  if (savedRow){
    mergeRow(S.allPicks, savedRow);
    if (Number(gameId) === Number(S.currentGame?.id)) mergeRow(S.picks, savedRow);
  }

  markLocalWrite("picks", savedRow || row);
  return savedRow;
}

async function finalizeGame(){
  if (!(await requireAuth('finalize games'))) return;
  try{
    const g = S.currentGame;
    if (!g) return toast("No current game.");

    // Snapshot the visible Game Day state before any async saves/realtime updates can mutate it.
    const finalForm = {...S.form};

    if (!finalForm.a1 || !finalForm.a2 || !finalForm.j1 || !finalForm.j2) return toast("Pick all 4 players first.");
    const finalPicks = [finalForm.a1, finalForm.a2, finalForm.j1, finalForm.j2];
    if (new Set(finalPicks).size !== finalPicks.length) return toast("Each player can only be picked once for this game.");
    if (!confirm("Lock this game as final? This will save the result and advance to the next game.")) return;

    const aScore =
      pickPoints(finalForm.a1, finalForm.ag1, finalForm.aa1, finalForm.firstGoal) +
      pickPoints(finalForm.a2, finalForm.ag2, finalForm.aa2, finalForm.firstGoal);
    const jScore =
      pickPoints(finalForm.j1, finalForm.jg1, finalForm.ja1, finalForm.firstGoal) +
      pickPoints(finalForm.j2, finalForm.jg2, finalForm.ja2, finalForm.firstGoal);
    const finalScore = { a:aScore, j:jScore, w:win(aScore, jScore) };

    const recap = finalScore.w === "Tie"
      ? `Tie ${finalScore.a}-${finalScore.j}. Nobody gets bragging rights.`
      : `${finalScore.w} wins ${finalScore.a}-${finalScore.j}. Scoreboard never lies.`;

    // Save all four picks from the immutable snapshot before marking the game Final.
    // This prevents finalization realtime/loading from advancing the app and clearing later pick saves.
    await upsertPick(g.id,"Aaron",1,finalForm.a1,finalForm.ag1,finalForm.aa1,pickPoints(finalForm.a1,finalForm.ag1,finalForm.aa1,finalForm.firstGoal));
    await upsertPick(g.id,"Aaron",2,finalForm.a2,finalForm.ag2,finalForm.aa2,pickPoints(finalForm.a2,finalForm.ag2,finalForm.aa2,finalForm.firstGoal));
    await upsertPick(g.id,"Julie",1,finalForm.j1,finalForm.jg1,finalForm.ja1,pickPoints(finalForm.j1,finalForm.jg1,finalForm.ja1,finalForm.firstGoal));
    await upsertPick(g.id,"Julie",2,finalForm.j2,finalForm.jg2,finalForm.ja2,pickPoints(finalForm.j2,finalForm.jg2,finalForm.ja2,finalForm.firstGoal));

    const upd = await db.from("games").update({
      status:"Final",
      first_goal_scorer:finalForm.firstGoal || null,
      aaron_points:finalScore.a,
      julie_points:finalScore.j,
      winner:finalScore.w,
      recap
    }).eq("id", g.id);

    if (upd.error) throw upd.error;

    S.lastRecap = buildPostgameRecap(g, finalScore);
    await loadAll();
    haptic("success");
    const finalMsg = finalScore.w === "Tie" ? `Final: Tie ${finalScore.a}-${finalScore.j}.` : `Final: ${finalScore.w} wins ${finalScore.a}-${finalScore.j}.`;
    sendPushNotification("Canes Rivalry Final", finalMsg, `final-${g.id}`);
    toast(S.lastRecap ? S.lastRecap.title : "Game locked. Next game loaded.");
  } catch(e){
    toast(e.message || "Could not finalize.");
  }
}

async function addGameFromUI(){
  if (!(await requireAuth('manage schedule'))) return;
  const dateEl = document.getElementById("newGameDate");
  const opponentEl = document.getElementById("newGameOpponent");
  const typeEl = document.getElementById("newGameType");
  const firstPickerEl = document.getElementById("newGameFirstPicker");

  const date = dateEl?.value || null;
  const opponent = opponentEl?.value?.trim() || "TBD";
  const gameType = typeEl?.value || "Regular Season";
  const firstPicker = firstPickerEl?.value || "Aaron";

  const clearNewGameForm = () => {
    if (dateEl) dateEl.value = "";
    if (opponentEl) opponentEl.value = "";
    if (typeEl) typeEl.value = "Regular Season";
    if (firstPickerEl) firstPickerEl.value = "Aaron";
  };

  try{
    const existing = S.games.find(g =>
      Number(g.season_id) === Number(S.activeSeason.id) &&
      (g.game_date || "") === (date || "") &&
      String(g.opponent || "").toLowerCase() === String(opponent || "").toLowerCase() &&
      g.status !== "Final"
    );

    if (existing){
      const res = await db.from("games").update({
        game_date:date,
        opponent,
        game_type:gameType,
        first_picker:firstPicker,
        status:"Scheduled",
        aaron_points:0,
        julie_points:0
      }).eq("id", existing.id);
      if (res.error) throw res.error;
      await loadAll();
      renderScheduleScreen();
      clearNewGameForm();
      haptic("success");
      toast("Game reactivated.");
      return;
    }

    const maxNum = S.games.reduce((m,g) => Math.max(m, Number(g.game_number || 0)), 0);
    const res = await db.from("games").insert({
      season_id:S.activeSeason.id,
      game_number:maxNum + 1,
      game_date:date,
      opponent,
      game_type:gameType,
      first_picker:firstPicker,
      status:"Scheduled",
      aaron_points:0,
      julie_points:0
    });
    if (res.error) throw res.error;
    await loadAll();
    renderScheduleScreen();
    clearNewGameForm();
    haptic("success");
    toast("Game added.");
  } catch(e){
    toast(e.message || "Could not add game.");
  }
}

async function saveHistoryGame(gameId){
  if (!(await requireAuth('edit history'))) return;
  try{
    if (!confirm("Save changes to this historical game?")) return;

    const existingGame = S.allGames.find(g => Number(g.id) === Number(gameId)) || {};
    const existingPicks = S.allPicks.filter(p => p.game_id === gameId);
    const existingPick = (owner, slot) => existingPicks.find(p => p.owner === owner && Number(p.pick_slot) === slot) || {};

    const val = (id, fallback="") => {
      const el = document.getElementById(id);
      return el ? el.value : fallback;
    };
    const numVal = (id, fallback=0) => {
      const raw = val(id, fallback);
      return Number(String(raw || "0").replace(/\D/g, "") || 0);
    };

    const firstGoal = val(`editFirstGoal_${gameId}`, existingGame.first_goal_scorer || "");
    const a1 = val(`editA1_${gameId}`, existingPick("Aaron",1).player_name || "").trim();
    const a2 = val(`editA2_${gameId}`, existingPick("Aaron",2).player_name || "").trim();
    const j1 = val(`editJ1_${gameId}`, existingPick("Julie",1).player_name || "").trim();
    const j2 = val(`editJ2_${gameId}`, existingPick("Julie",2).player_name || "").trim();

    const editPicks = [a1,a2,j1,j2].filter(Boolean);
    if (new Set(editPicks).size !== editPicks.length){
      toast("Each player can only be picked once for a game.");
      return;
    }

    const a1g = numVal(`editA1G_${gameId}`, existingPick("Aaron",1).goals || 0);
    const a1a = numVal(`editA1A_${gameId}`, existingPick("Aaron",1).assists || 0);
    const a2g = numVal(`editA2G_${gameId}`, existingPick("Aaron",2).goals || 0);
    const a2a = numVal(`editA2A_${gameId}`, existingPick("Aaron",2).assists || 0);
    const j1g = numVal(`editJ1G_${gameId}`, existingPick("Julie",1).goals || 0);
    const j1a = numVal(`editJ1A_${gameId}`, existingPick("Julie",1).assists || 0);
    const j2g = numVal(`editJ2G_${gameId}`, existingPick("Julie",2).goals || 0);
    const j2a = numVal(`editJ2A_${gameId}`, existingPick("Julie",2).assists || 0);

    const a1pts = a1 ? pickPoints(a1, a1g, a1a, firstGoal) : 0;
    const a2pts = a2 ? pickPoints(a2, a2g, a2a, firstGoal) : 0;
    const j1pts = j1 ? pickPoints(j1, j1g, j1a, firstGoal) : 0;
    const j2pts = j2 ? pickPoints(j2, j2g, j2a, firstGoal) : 0;
    const aPts = a1pts + a2pts;
    const jPts = j1pts + j2pts;

    const patch = {
      game_date: val(`editDate_${gameId}`, existingGame.game_date || "") || null,
      opponent: val(`editOpponent_${gameId}`, existingGame.opponent || "") || null,
      game_type: val(`editType_${gameId}`, existingGame.game_type || "Regular Season"),
      first_picker: val(`editFirst_${gameId}`, existingGame.first_picker || "") || null,
      status: val(`editStatus_${gameId}`, existingGame.status || "Final"),
      first_goal_scorer: firstGoal || null,
      aaron_points: aPts,
      julie_points: jPts,
      winner: win(aPts, jPts),
      recap: `Edited historical record. Aaron ${aPts}, Julie ${jPts}.`
    };

    const upd = await db.from("games").update(patch).eq("id", gameId);
    if (upd.error) throw upd.error;

    if (a1) await upsertPick(gameId, "Aaron", 1, a1, a1g, a1a, a1pts);
    if (a2) await upsertPick(gameId, "Aaron", 2, a2, a2g, a2a, a2pts);
    if (j1) await upsertPick(gameId, "Julie", 1, j1, j1g, j1a, j1pts);
    if (j2) await upsertPick(gameId, "Julie", 2, j2, j2g, j2a, j2pts);

    S.editingGameId = null;
    S.editPanel = "result";
    await loadAll();
    haptic("success");
    toast("History updated.");
  } catch(e){
    toast(e.message || "Could not save history.");
  }
}


async function startNewSeason(){
  if (!(await requireAuth('start a new season'))) return;
  const key = prompt("New season key? Example: 2026-2027");
  if (!key) return;
  if (!confirm(`Start new season ${key}? This archives the current season totals and makes ${key} active.`)) return;

  const display = key.replace("-", "–");

  try{
    const currentTotals = totals();

    if (S.activeSeason){
      await db.from("seasons").update({
        aaron_final_total:currentTotals.a,
        julie_final_total:currentTotals.j,
        is_active:false
      }).eq("id", S.activeSeason.id);
    }

    const res = await db.from("seasons").upsert({
      season_key:key,
      display_name:display,
      is_active:true,
      aaron_final_total:0,
      julie_final_total:0,
      total_source:"active"
    }, {onConflict:"season_key"});

    if (res.error) throw res.error;

    S.selectedHistorySeasonId = null;
    await loadAll();
    toast("New season active.");
  } catch(e){
    toast(e.message || "Could not start season.");
  }
}

let lastAutoRefresh = 0;

async function autoRefresh(){
  const now = Date.now();
  if (now - lastAutoRefresh < 3000) return;
  lastAutoRefresh = now;
  try{
    await loadAll();
  } catch(e){
    console.warn("Auto-refresh failed", e);
  }
}

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) autoRefresh();
});

window.addEventListener("focus", autoRefresh);

window.addEventListener("pageshow", (event) => {
  if (event.persisted) autoRefresh();
});


db.auth.onAuthStateChange(async (_event, session) => {
  S.user = session?.user || null;
  renderAll();
});
