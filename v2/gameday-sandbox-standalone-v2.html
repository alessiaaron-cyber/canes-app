<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canes Rivalry Game Day Sandbox V2</title>
  <style>
    :root{--gd-red:#c8102e;--gd-red-dark:#8d1225;--gd-red-soft:#fff1f4;--gd-ink:#11151f;--gd-muted:#707986;--gd-border:#e7e9ee;--gd-bg:#f7f8fa;--gd-card:#fff;--gd-shell:26px;--gd-card-radius:18px;--gd-pill:999px;--gd-shadow:0 16px 30px rgba(17,21,31,.06)}
    *{box-sizing:border-box} body{margin:0;background:var(--gd-bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:var(--gd-ink)} button,input{font:inherit} img{display:block;max-width:100%}
    .gd-shell{width:min(100%,430px);margin:0 auto;min-height:100vh;padding:16px 14px 34px}.gd-preview-head{margin-bottom:14px}.gd-eyebrow{color:var(--gd-muted);font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.gd-preview-head h1{margin:6px 0 0;font-size:2.2rem;line-height:.92;letter-spacing:-.08em}.gd-preview-head p{margin:7px 0 0;color:var(--gd-muted);font-size:.9rem;font-weight:600}
    .gd-state-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.gd-state-button{height:42px;border:1px solid var(--gd-border);border-radius:14px;background:#fff;color:var(--gd-muted);font-weight:900}.gd-state-button.is-active{background:var(--gd-ink);border-color:var(--gd-ink);color:#fff}
    .gd-phone{overflow:hidden;background:var(--gd-card);border:1px solid var(--gd-border);border-radius:var(--gd-shell);box-shadow:var(--gd-shadow)}.gd-main{padding:12px;display:flex;flex-direction:column;gap:12px}
    .gd-card,.gd-hero,.gd-panel,.gd-sheet-card{border:1px solid var(--gd-border);border-radius:var(--gd-card-radius);background:#fff}.gd-card,.gd-sheet-card{padding:13px 14px}.gd-hero{padding:8px 10px 14px}.gd-panel{overflow:hidden}
    .gd-status-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}.gd-pill{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:0 10px;border-radius:var(--gd-pill);font-size:.71rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}.gd-pill.live{background:var(--gd-red);color:#fff}.gd-pill.final{color:var(--gd-red);background:var(--gd-red-soft)}.gd-pill.synced{color:#1a8b35}.gd-period{font-size:.9rem;font-weight:900}
    .gd-score-grid{display:grid;grid-template-columns:88px 1fr 88px;gap:8px;align-items:center}.gd-side{text-align:center}.gd-side-label{font-size:.77rem;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}.gd-side-label.red{color:var(--gd-red)}.gd-side-value{margin-top:4px;font-size:3.5rem;line-height:.85;letter-spacing:-.08em;font-weight:1000}.gd-side-value.is-compact{font-size:1.02rem;line-height:1.15;letter-spacing:-.02em}.gd-pick-meta{display:inline-flex;flex-direction:column;gap:4px;align-items:center}.gd-pick-chip{min-height:24px;padding:0 10px;border-radius:999px;background:#f3f5f8;color:var(--gd-muted);font-size:.72rem;font-weight:900;display:inline-flex;align-items:center;justify-content:center}.gd-pick-chip.active{background:var(--gd-red-soft);color:var(--gd-red)}.gd-center{text-align:center}.gd-logo{width:60px;height:60px;border-radius:16px;object-fit:cover;margin:0 auto}.gd-subline{text-align:center;font-size:.95rem;font-weight:700;line-height:1.32;margin:10px 14px 0}.gd-helper{text-align:center;color:var(--gd-muted);font-size:.78rem;font-weight:700;margin-top:6px}
    .gd-manage-inline{display:flex;justify-content:center;margin-top:10px}.gd-manage-btn{border:1px solid var(--gd-border);background:#fff;border-radius:999px;padding:7px 12px;font-size:.74rem;font-weight:900;color:var(--gd-muted)}
    .gd-momentum-label{text-align:center;color:var(--gd-muted);font-size:.74rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin:12px 0 8px}.gd-track{position:relative;height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(17,21,31,.12),rgba(17,21,31,.06) 48%,rgba(17,21,31,.06) 52%,rgba(200,16,46,.12))}.gd-track-fill{position:absolute;top:0;bottom:0;border-radius:inherit;background:linear-gradient(90deg,var(--gd-red),#ff8c9e)}
    .gd-label-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.gd-label{font-size:.76rem;font-weight:1000;letter-spacing:.08em;text-transform:uppercase}.gd-filter{color:var(--gd-muted);font-size:.76rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
    .gd-picks-grid,.gd-sim-grid,.gd-final-picks{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gd-panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;color:#fff;font-size:.76rem;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}.gd-panel-head.red{background:linear-gradient(135deg,var(--gd-red),var(--gd-red-dark))}.gd-panel-head.dark{background:linear-gradient(135deg,#202530,#434b57)}
    .gd-pick-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;padding:11px 12px;border-top:1px solid var(--gd-border)}.gd-pick-row:first-child{border-top:0}.gd-pick-row.is-empty{background:#fafbfc}.gd-pick-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f8f0f2;color:var(--gd-red);font-size:.75rem}.gd-pick-main strong{display:block;font-size:.9rem;font-weight:900}.gd-pick-main small{display:block;margin-top:3px;color:var(--gd-muted);font-size:.75rem;font-weight:700}.gd-lock-actions{display:flex;gap:8px;margin-top:8px}.gd-small-action{border:1px solid var(--gd-border);background:#fff;border-radius:999px;padding:6px 10px;font-size:.72rem;font-weight:900;color:var(--gd-muted)}
    .gd-search{display:flex;gap:10px;align-items:center;padding:12px 14px;border:1px solid var(--gd-border);border-radius:18px;background:#fff}.gd-search-input{flex:1;border:0;background:#f4f6f8;border-radius:12px;padding:12px 14px;color:var(--gd-ink)}.gd-search-input:focus{outline:2px solid rgba(200,16,46,.15)}
    .gd-roster{padding:0;overflow:hidden}.gd-scroll{max-height:340px;overflow:auto}.gd-roster-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 14px;border-top:1px solid var(--gd-border)}.gd-roster-row:first-child{border-top:0}.gd-roster-row.clickable{cursor:pointer}.gd-roster-row.clickable:hover{background:#fff7f8}.gd-roster-row.claimed{background:#fafbfc}.gd-roster-row.claimed .gd-pick-main strong,.gd-roster-row.claimed .gd-pick-main small{color:#a0a8b5}.gd-tag,.gd-draft-btn{min-width:58px;height:24px;padding:0 8px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900}.gd-draft-btn{background:var(--gd-red);color:#fff}.gd-tag{background:#edf1f5;color:var(--gd-muted)}
    .gd-stat-lines{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.gd-stat{min-height:22px;padding:0 8px;border-radius:999px;background:#f4f6f8;color:var(--gd-muted);font-size:.68rem;font-weight:900;display:inline-flex;align-items:center}.gd-stat.live{background:var(--gd-red-soft);color:var(--gd-red)}
    .gd-sim-button{border:1px solid var(--gd-border);border-radius:16px;padding:14px 12px;background:#fff;font-weight:900;color:var(--gd-ink)}.gd-sim-button.red{background:var(--gd-red);border-color:var(--gd-red);color:#fff}
    .gd-feed-list{display:flex;flex-direction:column;gap:10px}.gd-feed-item,.gd-recap-item,.gd-mvp{display:grid;gap:12px;align-items:center}.gd-feed-item{grid-template-columns:auto 1fr auto}.gd-recap-item{grid-template-columns:auto auto 1fr auto}.gd-mvp{grid-template-columns:68px 1fr auto}.gd-feed-icon,.gd-mvp-ring{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f7f8fa;color:var(--gd-red)}.gd-mvp-ring{width:64px;height:64px;border:5px solid #d9dce2;border-left-color:var(--gd-red);background:#fff;color:var(--gd-ink)}.gd-feed-sub{color:var(--gd-muted);font-size:.8rem;font-weight:700}
    .gd-win-card{background:linear-gradient(180deg,#fff6f8 0%,#fff 55%);border:1px solid #f2d4da;padding:16px 14px 14px;border-radius:20px}.gd-win-banner{text-align:center;color:var(--gd-red);font-size:2rem;line-height:.9;letter-spacing:-.08em;font-weight:1000}.gd-win-sub{text-align:center;color:var(--gd-muted);font-size:.82rem;font-weight:800;margin-top:8px;text-transform:uppercase;letter-spacing:.08em}.gd-celebrate{text-align:center;font-size:1.4rem;margin-bottom:6px}
    .gd-sheet{position:fixed;inset:0;background:rgba(17,21,31,.38);display:none;align-items:flex-end;justify-content:center;padding:16px;z-index:20}.gd-sheet.is-open{display:flex}.gd-sheet-card{width:min(100%,430px);border-radius:24px 24px 18px 18px;box-shadow:0 24px 50px rgba(17,21,31,.18)}.gd-sheet-handle{width:44px;height:5px;border-radius:999px;background:#d8dce3;margin:0 auto 14px}.gd-sheet-title{text-align:center;font-size:1.1rem;font-weight:1000;letter-spacing:-.03em}.gd-sheet-copy{text-align:center;color:var(--gd-muted);font-size:.84rem;font-weight:700;line-height:1.35;margin:8px 8px 14px}.gd-sheet-actions{display:flex;flex-direction:column;gap:10px}.gd-sheet-btn{border:1px solid var(--gd-border);background:#fff;border-radius:16px;padding:14px 12px;text-align:left;font-weight:900;color:var(--gd-ink)}.gd-sheet-btn small{display:block;margin-top:4px;color:var(--gd-muted);font-weight:700}.gd-sheet-btn.primary{background:var(--gd-red);border-color:var(--gd-red);color:#fff}.gd-sheet-btn.primary small{color:#ffe2e8}.gd-sheet-close{margin-top:10px;border:0;background:transparent;color:var(--gd-muted);font-weight:900}
    @media (max-width:390px){.gd-picks-grid,.gd-sim-grid,.gd-final-picks,.gd-score-grid{grid-template-columns:1fr}.gd-side-value{font-size:3rem}}
  </style>
</head>
<body>
  <div class="gd-shell">
    <header class="gd-preview-head">
      <div><div class="gd-eyebrow">Canes Rivalry V2</div><h1>Game Day Sandbox</h1><p>Refined standalone interactive preview.</p></div>
    </header>
    <section class="gd-state-bar">
      <button class="gd-state-button is-active" data-state="pregame" type="button">Pregame</button>
      <button class="gd-state-button" data-state="live" type="button">Live</button>
      <button class="gd-state-button" data-state="final" type="button">Final</button>
    </section>
    <main id="gd-root"></main>
  </div>

  <div class="gd-sheet" id="manageSheet">
    <div class="gd-sheet-card">
      <div class="gd-sheet-handle"></div>
      <div class="gd-sheet-title">Manage Picks</div>
      <div class="gd-sheet-copy">Use this only if you need to review, unlock, or manually override picks after puck drop.</div>
      <div class="gd-sheet-actions">
        <button class="gd-sheet-btn"><span>View locked picks</span><small>Review Aaron and Julie selections before making changes.</small></button>
        <button class="gd-sheet-btn"><span>Unlock picks</span><small>Re-open the draft flow if both players agree picks need correction.</small></button>
        <button class="gd-sheet-btn primary"><span>Manual override</span><small>Only use if neither player has checked score or stats.</small></button>
      </div>
      <button class="gd-sheet-close" type="button" id="closeSheet">Close</button>
    </div>
  </div>

  <script>
    const logo='./assets/app-icon.png';
    const roster=[['Sebastian Aho','C • Top line'],['Andrei Svechnikov','RW • PP1'],['Seth Jarvis','RW • Hot streak'],['Jaccob Slavin','D • Defensive anchor'],['Jordan Staal','C • Two-way center'],['Brent Burns','D • PP2'],['Pyotr Kochetkov','G • Starting goalie'],['Jesperi Kotkaniemi','C • Middle six'],['Jackson Blake','RW • Rookie spark']];
    let currentState='pregame',currentPick=0;
    let picks={Aaron:[],Julie:[]};
    let scores={Aaron:0,Julie:0};
    let playerStats={};
    const order=['Aaron','Julie','Aaron','Julie'];
    const feed=[];
    const root=document.getElementById('gd-root');
    const manageSheet=document.getElementById('manageSheet');

    function ensurePlayer(name){if(!playerStats[name])playerStats[name]={goals:0,assists:0,firstGoal:false}}
    function claimedBy(name){return picks.Aaron.includes(name)?'Aaron':picks.Julie.includes(name)?'Julie':null}
    function activePlayer(){return order[currentPick]||'Draft complete'}
    function pregameMeta(side){const count=picks[side].length;return `<div class='gd-pick-meta'><span class='gd-pick-chip ${count===2?'active':''}'>${count} of 2 locked</span></div>`}
    function boardSubline(){if(currentState==='pregame'){return currentPick>=4?'Picks ready for puck drop':`${activePlayer()} on the clock • Pick ${currentPick+1} of 4`} if(currentState==='live') return 'Rivalry scoring live'; if(scores.Aaron>scores.Julie) return 'Aaron wins the night'; if(scores.Julie>scores.Aaron) return 'Julie wins the night'; return 'Rivalry tied'}
    function momentumWidth(){return Math.min(Math.abs(scores.Aaron-scores.Julie)*12,48)}
    function topBoard(label){const period=currentState==='pregame'?'Tonight • 7:00 PM':currentState==='live'?'2nd • 8:14':'Final'; const synced=currentState==='live'?"<span class='gd-pill synced'>Synced</span>":''; const liveMomentum=currentState==='live'?`<div class='gd-momentum-label'>Momentum</div><div class='gd-track'><div class='gd-track-fill' style='left:${scores.Aaron>=scores.Julie?'50%':`calc(50% - ${momentumWidth()}%)`};width:${momentumWidth()}%'></div></div>`:''; const left=currentState==='pregame'?pregameMeta('Aaron'):`<div class='gd-side-value'>${scores.Aaron}</div>`; const right=currentState==='pregame'?pregameMeta('Julie'):`<div class='gd-side-value'>${scores.Julie}</div>`; return `<section class='gd-hero'><div class='gd-status-row'><span class='gd-pill ${currentState==='final'?'final':'live'}'>${label}</span><span class='gd-period'>${period}</span>${synced}</div><div class='gd-score-grid'><div class='gd-side'><div class='gd-side-label red'>Aaron</div>${left}</div><div class='gd-center'><img class='gd-logo' src='${logo}' alt='Canes Rivalry'></div><div class='gd-side'><div class='gd-side-label'>Julie</div>${right}</div></div><div class='gd-subline'>${boardSubline()}</div>${liveMomentum}${currentState!=='pregame'?`<div class='gd-manage-inline'><button class='gd-manage-btn' type='button' id='openManage'>Manage Picks</button></div>`:''}</section>`}
    function lockedRows(side){const arr=picks[side]; const filled=arr.map(name=>`<div class='gd-pick-row'><div class='gd-pick-icon'>✓</div><div class='gd-pick-main'><strong>${name}</strong><small>Locked pick</small><div class='gd-lock-actions'><button class='gd-small-action' data-side='${side}' data-player='${name}'>Change Pick</button></div></div></div>`).join(''); const empty=Array.from({length:2-arr.length},()=>`<div class='gd-pick-row is-empty'><div class='gd-pick-icon'>…</div><div class='gd-pick-main'><strong>Open slot</strong><small>Waiting for next pick</small></div></div>`).join(''); return filled+empty}
    function statChips(name){ensurePlayer(name); const s=playerStats[name]; const chips=[]; chips.push(`<span class='gd-stat ${s.goals?'live':''}'>Goals ${s.goals}</span>`); chips.push(`<span class='gd-stat ${s.assists?'live':''}'>Assists ${s.assists}</span>`); chips.push(`<span class='gd-stat ${s.firstGoal?'live':''}'>First Goal ${s.firstGoal?'Yes':'No'}</span>`); return chips.join('')}
    function totalForPlayer(name){ensurePlayer(name); const s=playerStats[name]; return s.goals*2+s.assists+(s.firstGoal?2:0)}
    function livePlayerRows(side){const arr=picks[side].length?picks[side]:['No pick']; return arr.map(name=>name==='No pick'?`<div class='gd-pick-summary-row'><span>No pick</span><strong>+0</strong></div>`:`<div class='gd-pick-row'><div class='gd-pick-icon'>★</div><div class='gd-pick-main'><strong>${name}</strong><small>${totalForPlayer(name)} rivalry pts</small><div class='gd-stat-lines'>${statChips(name)}</div></div></div>`).join('')}
    function bindChangePick(){document.querySelectorAll('.gd-small-action').forEach(btn=>btn.onclick=()=>removePick(btn.dataset.side,btn.dataset.player))}
    function bindManage(){const open=document.getElementById('openManage'); if(open) open.onclick=()=>manageSheet.classList.add('is-open')}
    function renderPregame(filter=''){const rows=roster.filter(([n])=>n.toLowerCase().includes(filter.toLowerCase())); root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Pregame')}<div class='gd-label-row'><div class='gd-label'>Live Picks</div><div class='gd-filter'>Updates instantly</div></div><section class='gd-picks-grid'><article class='gd-panel'><div class='gd-panel-head red'><span>Aaron</span><span>${picks.Aaron.length}/2</span></div>${lockedRows('Aaron')}</article><article class='gd-panel'><div class='gd-panel-head dark'><span>Julie</span><span>${picks.Julie.length}/2</span></div>${lockedRows('Julie')}</article></section><section class='gd-search'><input class='gd-search-input' id='playerSearch' placeholder='Search current Canes roster...' value='${filter.replace(/'/g,'&#39;')}' /></section><div class='gd-label-row'><div class='gd-label'>Current Canes Roster</div><div class='gd-filter'>Tap to draft</div></div><section class='gd-panel gd-roster gd-scroll'>${rows.map(([name,detail])=>{const owner=claimedBy(name);return `<div class='gd-roster-row ${owner?'claimed':''} ${owner?'':'clickable'}' data-player='${name}'><div class='gd-pick-main'><strong>${name}</strong><small>${detail}</small></div>${owner?`<span class='gd-tag'>${owner}</span>`:`<span class='gd-draft-btn'>Draft</span>`}</div>`}).join('')}</section></div></section>`; document.querySelectorAll('.clickable').forEach(el=>el.onclick=()=>draftPlayer(el.dataset.player)); const search=document.getElementById('playerSearch'); if(search) search.oninput=e=>renderPregame(e.target.value); bindChangePick()}
    function draftPlayer(name){if(currentPick>=4||claimedBy(name)) return; const side=order[currentPick]; if(picks[side].length>=2) return; picks[side].push(name); ensurePlayer(name); currentPick+=1; renderPregame(document.getElementById('playerSearch')?.value||'')}
    function removePick(side,name){picks[side]=picks[side].filter(p=>p!==name); currentPick=picks.Aaron.length+picks.Julie.length; renderPregame(document.getElementById('playerSearch')?.value||'')}
    function renderLive(){root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Live')}<div class='gd-label-row'><div class='gd-label'>Simulate Updates</div><div class='gd-filter'>Goal / Assist / Bonus</div></div><div class='gd-sim-grid'><button class='gd-sim-button red' data-side='Aaron' data-kind='goal'>Aaron Goal</button><button class='gd-sim-button' data-side='Julie' data-kind='goal'>Julie Goal</button><button class='gd-sim-button red' data-side='Aaron' data-kind='assist'>Aaron Assist</button><button class='gd-sim-button' data-side='Julie' data-kind='assist'>Julie Assist</button><button class='gd-sim-button red' data-side='Aaron' data-kind='first'>Aaron First Goal</button><button class='gd-sim-button' data-side='Julie' data-kind='first'>Julie First Goal</button></div><div class='gd-label-row'><div class='gd-label'>Picked Players</div><div class='gd-filter'>Goals / Assists / First Goal</div></div><section class='gd-picks-grid'><article class='gd-card'><div class='gd-pick-summary-head'><span class='gd-red-text'>Aaron</span><span>${scores.Aaron} pts</span></div>${livePlayerRows('Aaron')}</article><article class='gd-card'><div class='gd-pick-summary-head'><span>Julie</span><span>${scores.Julie} pts</span></div>${livePlayerRows('Julie')}</article></section><div class='gd-label-row'><div class='gd-label'>Rivalry Feed</div><div class='gd-filter'>Live</div></div><section class='gd-feed-list'>${feed.map(item=>`<article class='gd-card gd-feed-item'><div class='gd-feed-icon'>🚨</div><div><div><strong>${item.title}</strong></div><div class='gd-feed-sub'>${item.detail}</div></div><div><strong>+${item.points}</strong></div></article>`).join('')}</section></div></section>`; document.querySelectorAll('.gd-sim-button').forEach(btn=>btn.onclick=()=>simulate(btn.dataset.side,btn.dataset.kind)); bindManage()}
    function applyToSide(side,kind){const players=picks[side]; if(!players.length) return; const target=players[0]; ensurePlayer(target); if(kind==='goal'){playerStats[target].goals+=1; scores[side]+=2; feed.unshift({title:`${target} goal`,detail:`${side} scores through a picked player`,points:2})} if(kind==='assist'){playerStats[target].assists+=1; scores[side]+=1; feed.unshift({title:`${target} assist`,detail:`${side} adds an assist point`,points:1})} if(kind==='first'){if(playerStats[target].firstGoal) return; playerStats[target].firstGoal=true; scores[side]+=2; feed.unshift({title:`${target} first Canes goal`,detail:`${side} gets the first goal bonus`,points:2})}}
    function simulate(side,kind){applyToSide(side,kind); renderLive()}
    function renderFinal(){const winner=scores.Aaron>scores.Julie?'Aaron':scores.Julie>scores.Aaron?'Julie':'Tie'; root.innerHTML=`<section class='gd-phone'><div class='gd-main'><section class='gd-win-card'><div class='gd-celebrate'>🎉🏒🎉</div><div class='gd-win-banner'>${winner==='Tie'?'Rivalry Tie':winner+' Wins'}</div><div class='gd-win-sub'>Game complete</div><div style='margin-top:10px'>${topBoard('')}</div></section><section class='gd-card gd-recap-item'><div class='gd-feed-icon'>🏁</div><div>Final</div><div><strong>Rivalry recap</strong><div class='gd-feed-sub'>Draft picks fed directly into the live scoring experience.</div></div><div><strong>${scores.Aaron}-${scores.Julie}</strong></div></section><div class='gd-label-row'><div class='gd-label'>Final Picked Players</div><div class='gd-filter'>Carry scoring forward</div></div><section class='gd-final-picks'><article class='gd-card'><div class='gd-pick-summary-head'><span class='gd-red-text'>Aaron</span><span>${scores.Aaron} pts</span></div>${livePlayerRows('Aaron')}</article><article class='gd-card'><div class='gd-pick-summary-head'><span>Julie</span><span>${scores.Julie} pts</span></div>${livePlayerRows('Julie')}</article></section><section class='gd-card gd-mvp'><div class='gd-mvp-ring'>★</div><div><strong>Rivalry MVP</strong><div class='gd-feed-sub'>Celebratory final state with carried player scoring.</div></div><div><strong>${winner==='Tie'?'Tie':'Final'}</strong></div></section></div></section>`; bindManage()}
    function render(){if(currentState==='pregame')renderPregame(); else if(currentState==='live')renderLive(); else renderFinal()}
    document.querySelectorAll('.gd-state-button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.gd-state-button').forEach(b=>b.classList.remove('is-active')); btn.classList.add('is-active'); currentState=btn.dataset.state; render()});
    document.getElementById('closeSheet').onclick=()=>manageSheet.classList.remove('is-open'); manageSheet.onclick=(e)=>{if(e.target===manageSheet)manageSheet.classList.remove('is-open')};
    render();
  </script>
</body>
</html>
