<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Canes Rivalry</title>

  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Canes Rivalry" />

  <link rel="icon" type="image/png" href="./assets/app-icon.png?v=navrestore3" />
  <link rel="apple-touch-icon" href="./assets/app-icon.png?v=navrestore3" />

  <link rel="stylesheet" href="styles.css?v=navrestore3" />
  <link rel="stylesheet" href="gameday-mock.css?v=navrestore3" />
</head>
<body>
  <div class="sync-flash" id="syncFlash"></div>

  <div class="app-shell">
    <header class="app-header">
      <div>
        <span class="eyebrow">Canes Rivalry V2</span>
        <h1 id="pageTitle">Game Day</h1>
      </div>

      <button class="icon-button" id="refreshButton" type="button">↻</button>
    </header>

    <section class="app-view active-view" id="gameDayView" data-view="gameday">
      <section class="state-lab panel-card">
        <div class="panel-header compact-header">
          <div>
            <span class="eyebrow">UI State Lab</span>
            <h2 id="stateTitle">Pregame Ready</h2>
          </div>

          <span class="panel-tag calm" id="stateBadge">Editable</span>
        </div>

        <div class="state-switcher" id="stateSwitcher">
          <button class="active" data-mode="pregame" type="button">Pregame</button>
          <button data-mode="missing" type="button">Missing</button>
          <button data-mode="live" type="button">Live</button>
          <button data-mode="final" type="button">Final</button>
        </div>
      </section>

      <main class="content-stack"></main>
    </section>

    <section class="app-view" id="historyView" data-view="history">
      <main class="content-stack">
        <section class="panel-card">
          <div class="eyebrow">History</div>
          <h2>Season rivalry archive</h2>
          <p style="margin-top:10px;color:#475467;line-height:1.45;">Stable placeholder restored while new Game Day is rebuilt separately.</p>
        </section>
      </main>
    </section>

    <section class="app-view" id="manageView" data-view="manage">
      <main class="content-stack">
        <section class="panel-card">
          <div class="eyebrow">Manage</div>
          <h2>Settings and controls</h2>
          <p style="margin-top:10px;color:#475467;line-height:1.45;">Stable placeholder restored while new Game Day is rebuilt separately.</p>
        </section>
      </main>
    </section>
  </div>

  <nav class="bottom-nav" id="bottomNav">
    <button class="active" data-tab="gameday" type="button">Game Day</button>
    <button data-tab="history" type="button">History</button>
    <button data-tab="manage" type="button">Manage</button>
  </nav>

  <div class="toast-stack">
    <div id="toast" class="toast">Preview event</div>
  </div>

  <script src="js/mock-data.js?v=navrestore3"></script>
  <script src="js/ui.js?v=navrestore3"></script>
  <script src="js/tabs.js?v=navrestore3"></script>
  <script src="js/gameday.js?v=navrestore3"></script>
  <script src="js/app.js?v=navrestore3"></script>
</body>
</html>
