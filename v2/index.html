<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canes Rivalry V2</title>

  <link rel="stylesheet" href="./css/base.css?v=shell2" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <div class="eyebrow">Canes Rivalry V2</div>
        <h1 class="page-title" id="pageTitle">Game Day</h1>
      </div>

      <button class="icon-button" id="refreshButton" type="button">↻</button>
    </header>

    <main>
      <section class="app-view is-active" data-view="gameday">
        <div class="page-stack">
          <section class="surface-card section-card">
            <div class="section-heading section-heading--tight">
              <div>
                <div class="eyebrow">Shell Recovery</div>
                <h2 class="section-title">Game Day</h2>
              </div>
              <span class="status-chip status-chip--soft">Static</span>
            </div>
            <p>Minimal Game Day placeholder.</p>
          </section>
        </div>
      </section>

      <section class="app-view" data-view="history">
        <div class="page-stack">
          <section class="surface-card section-card">
            <div class="section-heading section-heading--tight">
              <div>
                <div class="eyebrow">Shell Recovery</div>
                <h2 class="section-title">History</h2>
              </div>
              <span class="status-chip status-chip--soft">Static</span>
            </div>
            <p>Minimal History placeholder.</p>
          </section>
        </div>
      </section>

      <section class="app-view" data-view="manage">
        <div class="page-stack">
          <section class="surface-card section-card">
            <div class="section-heading section-heading--tight">
              <div>
                <div class="eyebrow">Shell Recovery</div>
                <h2 class="section-title">Manage</h2>
              </div>
              <span class="status-chip status-chip--soft">Static</span>
            </div>
            <p>Minimal Manage placeholder.</p>
          </section>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <button class="nav-button is-active" data-tab="gameday" type="button">Game Day</button>
      <button class="nav-button" data-tab="history" type="button">History</button>
      <button class="nav-button" data-tab="manage" type="button">Manage</button>
    </div>
  </nav>

  <script src="./js/app.js?v=shell2"></script>
</body>
</html>
