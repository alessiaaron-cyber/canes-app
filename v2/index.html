<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Canes Rivalry V2</title>

  <meta name="theme-color" content="#f6f7f9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Canes Rivalry" />

  <link rel="icon" type="image/png" href="./assets/app-icon.png" />
  <link rel="apple-touch-icon" href="./assets/app-icon.png" />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/gameday.css" />
</head>
<body>
  <div class="app-shell">
    <main class="screen">
      <header class="topbar">
        <div class="topbar__side">
          <button class="icon-button" aria-label="Menu">☰</button>
        </div>

        <img class="wordmark" src="./assets/app-icon.png" alt="Canes Rivalry" />

        <div class="topbar__side">
          <button class="icon-button" aria-label="Notifications">🔔</button>
        </div>
      </header>

      <section class="card section-card stack">
        <div class="card-title-row">
          <div>
            <div class="card-meta">V2 Game Day Lab</div>
            <h1 class="card-title">State Preview</h1>
          </div>

          <span class="pill pill--soft">Static UI</span>
        </div>

        <div class="state-switcher">
          <button class="state-switcher__button is-active" data-state="pregame" type="button">Pregame</button>
          <button class="state-switcher__button" data-state="live" type="button">Live</button>
          <button class="state-switcher__button" data-state="final" type="button">Final</button>
        </div>
      </section>

      <div id="app" class="stack"></div>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Primary">
    <div class="bottom-nav__inner">
      <button class="nav-item is-active" type="button">
        <span class="nav-item__icon">🏒</span>
        <span>Game Day</span>
      </button>

      <button class="nav-item" type="button">
        <span class="nav-item__icon">🕘</span>
        <span>History</span>
      </button>

      <button class="nav-item" type="button">
        <span class="nav-item__icon">📊</span>
        <span>Standings</span>
      </button>

      <button class="nav-item" type="button">
        <span class="nav-item__icon">👤</span>
        <span>You</span>
      </button>
    </div>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
