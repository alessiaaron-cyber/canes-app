<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />

  <title>Canes Rivalry</title>

  <meta name="theme-color" content="#f8fafc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Canes Rivalry" />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="css/app-foundation.css?v=foundation9" />

</head>
<body>
  <div id="appRoot"></div>

  <template id="appShellTemplate">
    <div class="sync-flash" id="syncFlash"></div>
    <div class="pull-refresh" id="pullRefresh" aria-hidden="true">
      <div class="pull-refresh-indicator">
        <span class="pull-refresh-icon">↻</span>
        <span class="pull-refresh-label" id="pullRefreshLabel">Pull to refresh</span>
      </div>
    </div>

    <div class="app-shell">
      <header class="app-header">
        <div>
          <div class="app-header-topline">
            <span class="eyebrow">Canes Rivalry</span>
            <span class="global-live-indicator is-hidden" id="globalLiveIndicator"><span class="global-live-dot"></span>Live</span>
          </div>
          <h1 id="pageTitle">Game Day</h1>
        </div>

        <div class="app-header-actions">
          <div class="account-chip" id="accountChip">
            <div class="account-chip-avatar" id="accountChipAvatar">C</div>
            <div class="account-chip-copy">
              <div class="account-chip-name" id="accountChipName">Canes Rivalry</div>
              <div class="account-chip-meta" id="accountChipMeta">Signed in</div>
            </div>
          </div>
        </div>
      </header>

      <section class="app-view active-view" id="gameDayView" data-view="gameday">
        <section class="state-lab panel-card game-toolbar-card">
          <div class="panel-header compact-header">
            <div>
              <span class="eyebrow">Game Day</span>
              <h2 id="stateTitle">Pregame</h2>
            </div>
            <div class="panel-header-actions">
              <span class="panel-tag calm" id="stateBadge">Regular</span>
            </div>
          </div>

          <div class="gd-toolbar-group">
            <div class="gd-toolbar-label">Phase</div>
            <div class="state-switcher" id="phaseSwitcher">
              <button class="active" data-phase="pregame" type="button">Pregame</button>
              <button data-phase="live" type="button">Live</button>
              <button data-phase="final" type="button">Final</button>
            </div>
          </div>

          <div class="gd-toolbar-group">
            <div class="gd-toolbar-label">Playoffs</div>
            <div class="playoff-switcher" id="modeSwitcher">
              <button class="active" data-playoff-mode="regular" type="button">Off</button>
              <button data-playoff-mode="playoffs" type="button">On</button>
            </div>
          </div>

          <div class="gd-toolbar-group">
            <div class="gd-toolbar-label">Carryover</div>
            <div class="carryover-switcher" id="carryoverSwitcher">
              <button class="active" data-carryover="off" type="button">Off</button>
              <button data-carryover="on" type="button">On</button>
            </div>
          </div>
        </section>

        <main class="content-stack gameday-stack" id="gameDayContent"></main>
      </section>

      <section class="app-view" id="historyView" data-view="history"></section>

      <section class="app-view" id="manageView" data-view="manage">
        <main class="content-stack">
          <section class="panel-card account-panel">
            <div class="panel-header compact-header">
              <div>
                <div class="eyebrow">Account</div>
                <h2 id="manageAccountTitle">Signed in</h2>
              </div>
              <span class="panel-tag dark" id="manageAccountRole">Admin</span>
            </div>

            <div class="account-panel-body">
              <div class="account-panel-avatar" id="manageAccountAvatar">C</div>

              <div class="account-panel-copy">
                <div class="account-panel-name" id="manageAccountName">Canes Rivalry</div>
                <div class="account-panel-meta" id="manageAccountMeta">Authenticated session active</div>
                <div class="account-panel-email" id="manageAccountEmail">—</div>
              </div>
            </div>

            <div class="account-panel-actions">
              <button class="mini-button cr-button signout" id="manageSignOutButton" type="button">Sign out</button>
            </div>
          </section>

          <div id="manageContent"></div>
        </main>
      </section>
    </div>

    <nav class="bottom-nav" id="bottomNav">
      <button class="active" data-tab="gameday" type="button">Game Day</button>
      <button data-tab="history" type="button">History</button>
      <button data-tab="manage" type="button">Manage</button>
    </nav>

    <div class="gd-sheet" id="manageSheet">
      <div class="gd-sheet-card">
        <div class="gd-sheet-handle"></div>
        <div class="gd-sheet-title">Manage Picks</div>
        <div class="gd-sheet-copy">Admin-only quick swap for locked picks.</div>
        <div class="gd-sheet-actions" id="manageSheetActions"></div>
        <div class="gd-sheet-footer">
          <button class="gd-sheet-close" type="button" id="closeSheet">Cancel</button>
          <button class="gd-sheet-save" type="button" id="saveSheet">Save Picks</button>
        </div>
      </div>
    </div>

    <div class="toast-stack">
      <div id="toast" class="toast">Preview event</div>
    </div>
  </template>

  <script>
    window.CR = window.CR || {};
    window.CR.config = {

  <script src="js/supabase-client.js?v=auth4"></script>
  <script src="js/auth/auth-service.js?v=auth5"></script>
  <script src="js/auth/auth-ui.js?v=auth4"></script>
  <script src="js/gameday/gameday-model.js?v=model3"></script>
  <script src="js/gameday/gameday-helpers.js?v=helpers2"></script>
  <script src="js/gameday/gameday-render.js?v=render8"></script>
  <script src="js/gameday/gameday-events.js?v=events3"></script>
  <script src="js/gameday/gameday.js?v=v2gameday8"></script>
  <script src="js/history/history-mock-data.js?v=v2history2"></script>
  <script src="js/history/history-model.js?v=v2history2"></script>
  <script src="js/history/history-scoring-placeholders.js?v=v2historyrules1"></script>
  <script src="js/history/history-render.js?v=v2history5"></script>
  <script src="js/history/history-events.js?v=v2history2"></script>
  <script src="js/history/history.js?v=v2history2"></script>
  <script src="js/manage/manage-model.js?v=v2manage9"></script>
  <script src="js/manage/manage-render.js?v=v2manage11"></script>
  <script src="js/manage/manage-events.js?v=v2manage10"></script>
  <script src="js/manage/manage.js?v=v2manage9"></script>
  <script src="js/app.js?v=authboot7"></script>
  <script src="js/boot.js?v=authboot8"></script>
</body>
</html>
