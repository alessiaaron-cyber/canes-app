<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canes Rivalry Game Day Sandbox V6</title>
  <style>
    :root{--gd-red:#c8102e;--gd-red-dark:#8d1225;--gd-red-soft:#fff1f4;--gd-green:#1f9d55;--gd-green-soft:#e9f8ef;--gd-ink:#11151f;--gd-muted:#707986;--gd-border:#e7e9ee;--gd-bg:#f7f8fa;--gd-card:#fff;--gd-shell:26px;--gd-card-radius:18px;--gd-pill:999px;--gd-shadow:0 16px 30px rgba(17,21,31,.06)}
    *{box-sizing:border-box} body{margin:0;background:var(--gd-bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:var(--gd-ink)} button,input,select{font:inherit} img{display:block;max-width:100%}
    .gd-shell{width:min(100%,430px);margin:0 auto;min-height:100vh;padding:16px 14px 34px}.gd-preview-head{margin-bottom:14px}.gd-eyebrow{color:var(--gd-muted);font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.gd-preview-head h1{margin:6px 0 0;font-size:2.2rem;line-height:.92;letter-spacing:-.08em}.gd-preview-head p{margin:7px 0 0;color:var(--gd-muted);font-size:.9rem;font-weight:600}
    .gd-state-bar,.gd-mode-bar{display:grid;gap:10px;margin-bottom:14px}.gd-state-bar{grid-template-columns:repeat(3,1fr)}.gd-mode-bar{grid-template-columns:1fr 1fr}.gd-state-button,.gd-mode-button{height:42px;border:1px solid var(--gd-border);border-radius:14px;background:#fff;color:var(--gd-muted);font-weight:900}.gd-state-button.is-active,.gd-mode-button.is-active{background:var(--gd-ink);border-color:var(--gd-ink);color:#fff}
    .gd-phone{overflow:hidden;background:var(--gd-card);border:1px solid var(--gd-border);border-radius:var(--gd-shell);box-shadow:var(--gd-shadow)}.gd-main{padding:12px;display:flex;flex-direction:column;gap:12px}
    .gd-card,.gd-hero,.gd-panel,.gd-sheet-card,.gd-win-card{border:1px solid var(--gd-border);border-radius:var(--gd-card-radius);background:#fff}.gd-card,.gd-sheet-card{padding:13px 14px}.gd-hero{padding:8px 10px 14px}.gd-panel{overflow:hidden}.gd-win-card{padding:14px 14px 13px}
    .gd-status-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}.gd-pill{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:0 10px;border-radius:var(--gd-pill);font-size:.71rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}.gd-pill.live{background:var(--gd-red);color:#fff}.gd-pill.final{color:var(--gd-red);background:var(--gd-red-soft)}.gd-pill.synced{color:#1a8b35}.gd-period{font-size:.9rem;font-weight:900}
    .gd-score-grid{display:grid;grid-template-columns:92px 1fr 92px;gap:8px;align-items:center}.gd-side{text-align:center}.gd-side-label{font-size:.77rem;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}.gd-side-label.red{color:var(--gd-red)}.gd-side-value{margin-top:4px;font-size:3.5rem;line-height:.85;letter-spacing:-.08em;font-weight:1000}.gd-pick-meta{display:inline-flex;flex-direction:column;gap:4px;align-items:center}.gd-pick-chip{min-height:24px;padding:0 10px;border-radius:999px;background:#f3f5f8;color:var(--gd-muted);font-size:.72rem;font-weight:900;display:inline-flex;align-items:center;justify-content:center}.gd-pick-chip.active{background:var(--gd-green-soft);color:var(--gd-green)}.gd-center{text-align:center}.gd-logo{width:60px;height:60px;border-radius:16px;object-fit:cover;margin:0 auto}.gd-subline{text-align:center;font-size:.95rem;font-weight:700;line-height:1.32;margin:10px 14px 0}
    .gd-momentum-label{text-align:center;color:var(--gd-muted);font-size:.74rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin:12px 0 8px}.gd-track{position:relative;height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(17,21,31,.12),rgba(17,21,31,.06) 48%,rgba(17,21,31,.06) 52%,rgba(200,16,46,.12))}.gd-track-fill{position:absolute;top:0;bottom:0;border-radius:inherit;background:linear-gradient(90deg,var(--gd-red),#ff8c9e);transition:left .35s ease,width .35s ease}
    .gd-label-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.gd-label{font-size:.76rem;font-weight:1000;letter-spacing:.08em;text-transform:uppercase}.gd-filter{color:var(--gd-muted);font-size:.76rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
    .gd-picks-grid,.gd-sim-grid,.gd-final-picks{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gd-story-stack{display:flex;flex-direction:column;gap:10px}.gd-panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;color:#fff;font-size:.76rem;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}.gd-panel-head.red{background:linear-gradient(135deg,var(--gd-red),var(--gd-red-dark))}.gd-panel-head.dark{background:linear-gradient(135deg,#202530,#434b57)}
    .gd-pick-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;padding:11px 12px;border-top:1px solid var(--gd-border);transition:transform .22s ease,background .22s ease,opacity .22s ease}.gd-pick-row:first-child{border-top:0}.gd-pick-row.is-empty{background:#fafbfc}.gd-pick-row.is-new{animation:gdSlide .28s ease}.gd-pick-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f8f0f2;color:var(--gd-red);font-size:.75rem}.gd-pick-main strong{display:block;font-size:.9rem;font-weight:900}.gd-pick-main small{display:block;margin-top:3px;color:var(--gd-muted);font-size:.75rem;font-weight:700}.gd-lock-actions{display:flex;gap:8px;margin-top:8px}.gd-small-action{border:1px solid var(--gd-border);background:#fff;border-radius:999px;padding:6px 10px;font-size:.72rem;font-weight:900;color:var(--gd-muted)}
    .gd-search{display:flex;gap:10px;align-items:center;padding:12px 14px;border:1px solid var(--gd-border);border-radius:18px;background:#fff}.gd-search-input{flex:1;border:0;background:#f4f6f8;border-radius:12px;padding:12px 14px;color:var(--gd-ink)}.gd-search-input:focus{outline:2px solid rgba(200,16,46,.15)}
    .gd-roster{padding:0;overflow:hidden}.gd-scroll{max-height:340px;overflow:auto}.gd-roster-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 14px;border-top:1px solid var(--gd-border);transition:background .2s ease,opacity .2s ease,transform .2s ease}.gd-roster-row:first-child{border-top:0}.gd-roster-row.clickable{cursor:pointer}.gd-roster-row.clickable:hover{background:#fff7f8}.gd-roster-row.claimed{background:#fafbfc;opacity:.72}.gd-roster-row.claimed .gd-pick-main strong,.gd-roster-row.claimed .gd-pick-main small{color:#a0a8b5}.gd-roster-row.claimed.is-new{animation:gdClaim .26s ease}.gd-tag,.gd-draft-btn{min-width:58px;height:24px;padding:0 8px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900}.gd-draft-btn{background:var(--gd-red);color:#fff}.gd-tag{background:#edf1f5;color:var(--gd-muted)}
    .gd-player-card{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-top:1px solid var(--gd-border)}.gd-player-card:first-of-type{border-top:0}.gd-player-main strong{display:block;font-size:.9rem;font-weight:900}.gd-player-total{font-size:1.08rem;font-weight:1000;letter-spacing:-.04em}.gd-player-stats{display:flex;gap:6px;margin-top:8px;flex-wrap:nowrap;overflow:hidden}.gd-stat{min-height:20px;padding:0 8px;border-radius:999px;background:#f4f6f8;color:var(--gd-muted);font-size:.64rem;font-weight:900;display:inline-flex;align-items:center;white-space:nowrap}.gd-stat.live{background:var(--gd-red-soft);color:var(--gd-red)}
    .gd-pick-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:8px;margin-bottom:2px;border-bottom:1px solid var(--gd-border)}.gd-pick-card-head strong{font-size:.8rem;letter-spacing:.04em;text-transform:uppercase}.gd-pick-card-head .red{color:var(--gd-red)}
    .gd-manage-tiny{border:1px solid #eceef2;background:#fff;border-radius:999px;padding:5px 9px;font-size:.64rem;font-weight:900;color:#8a92a0;line-height:1}
    .gd-sim-button{border:1px solid var(--gd-border);border-radius:16px;padding:14px 12px;background:#fff;font-weight:900;color:var(--gd-ink);transition:transform .18s ease}.gd-sim-button.red{background:var(--gd-red);border-color:var(--gd-red);color:#fff}.gd-sim-button:active{transform:scale(.98)}
    .gd-feed-list{display:flex;flex-direction:column;gap:10px}.gd-feed-item,.gd-story-item{display:grid;gap:12px;align-items:center}.gd-feed-item{grid-template-columns:auto 1fr auto}.gd-story-item{grid-template-columns:auto 1fr auto;min-height:86px}.gd-feed-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f7f8fa;color:var(--gd-red)}.gd-feed-sub{color:var(--gd-muted);font-size:.8rem;font-weight:700;line-height:1.35}
    .gd-win-card{box-shadow:none}.gd-win-banner{text-align:center;color:var(--gd-red);font-size:1.85rem;line-height:.92;letter-spacing:-.08em;font-weight:1000}.gd-win-sub{text-align:center;color:var(--gd-muted);font-size:.82rem;font-weight:800;margin-top:8px;text-transform:uppercase;letter-spacing:.08em}.gd-celebrate{text-align:center;font-size:1.25rem;margin-bottom:6px;animation:gdPop .45s ease}.gd-hero-final .gd-pill.final{display:none}.gd-hero-final .gd-status-row{margin-bottom:4px}
    .mode-playoffs .gd-phone{box-shadow:0 20px 38px rgba(200,16,46,.12)}.mode-playoffs .gd-state-button.is-active,.mode-playoffs .gd-mode-button.is-active{background:linear-gradient(135deg,var(--gd-red),var(--gd-red-dark));border-color:var(--gd-red-dark)}.mode-playoffs .gd-hero,.mode-playoffs .gd-win-card{border-color:#efc5cf;background:linear-gradient(180deg,#fff2f5 0%,#fff 58%)}.mode-playoffs .gd-win-card{box-shadow:0 14px 28px rgba(200,16,46,.12)}.mode-playoffs .gd-win-banner{font-size:2.12rem}.mode-playoffs .gd-pill.live{box-shadow:0 0 0 4px rgba(200,16,46,.10)}
    .gd-sheet{position:fixed;inset:0;background:rgba(17,21,31,.38);display:none;align-items:flex-end;justify-content:center;padding:16px;z-index:20}.gd-sheet.is-open{display:flex}.gd-sheet-card{width:min(100%,430px);border-radius:24px 24px 18px 18px;box-shadow:0 24px 50px rgba(17,21,31,.18)}.gd-sheet-handle{width:44px;height:5px;border-radius:999px;background:#d8dce3;margin:0 auto 14px}.gd-sheet-title{text-align:center;font-size:1.1rem;font-weight:1000;letter-spacing:-.03em}.gd-sheet-copy{text-align:center;color:var(--gd-muted);font-size:.84rem;font-weight:700;line-height:1.35;margin:8px 8px 14px}.gd-sheet-actions{display:flex;flex-direction:column;gap:12px}.gd-sheet-pick{border:1px solid var(--gd-border);background:#fff;border-radius:16px;padding:12px}.gd-sheet-pick strong{display:block;font-size:.84rem;letter-spacing:.04em;text-transform:uppercase}.gd-sheet-pick small{display:block;margin-top:4px;color:var(--gd-muted);font-weight:700}.gd-sheet-select{width:100%;margin-top:10px;border:1px solid var(--gd-border);border-radius:12px;background:#fff;padding:12px 10px}.gd-sheet-footer{display:flex;gap:10px;margin-top:12px}.gd-sheet-save{flex:1;border:0;background:var(--gd-red);color:#fff;border-radius:16px;padding:14px 12px;font-weight:900}.gd-sheet-close{flex:1;border:1px solid var(--gd-border);background:#fff;border-radius:16px;padding:14px 12px;font-weight:900;color:var(--gd-muted)}
    @keyframes gdSlide{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}@keyframes gdClaim{0%{opacity:1;transform:scale(1)}50%{transform:scale(.985)}100%{opacity:.72;transform:scale(1)}}@keyframes gdPop{0%{transform:scale(.92);opacity:.5}100%{transform:scale(1);opacity:1}}
    @media (max-width:390px){.gd-picks-grid,.gd-sim-grid,.gd-final-picks,.gd-score-grid{grid-template-columns:1fr}.gd-side-value{font-size:3rem}}
  </style>
</head>
<body>
  <div class="gd-shell" id="shell">
    <header class="gd-preview-head"><div><div class="gd-eyebrow">Canes Rivalry V2</div><h1>Game Day Sandbox</h1><p>Refined standalone interactive preview.</p></div></header>
    <section class="gd-state-bar"><button class="gd-state-button is-active" data-state="pregame" type="button">Pregame</button><button class="gd-state-button" data-state="live" type="button">Live</button><button class="gd-state-button" data-state="final" type="button">Final</button></section>
    <section class="gd-mode-bar"><button class="gd-mode-button is-active" data-mode="regular" type="button">Regular</button><button class="gd-mode-button" data-mode="playoffs" type="button">Playoffs</button></section>
    <main id="gd-root"></main>
  </div>

  <div class="gd-sheet" id="manageSheet">
    <div class="gd-sheet-card">
      <div class="gd-sheet-handle"></div>
      <div class="gd-sheet-title">Manage Picks</div>
      <div class="gd-sheet-copy">Admin-only quick swap for locked picks.</div>
      <div class="gd-sheet-actions" id="manageSheetActions"></div>
      <div class="gd-sheet-footer"><button class="gd-sheet-close" type="button" id="closeSheet">Cancel</button><button class="gd-sheet-save" type="button" id="saveSheet">Save Picks</button></div>
    </div>
  </div>

  <script>
    const logo='./assets/app-icon.png';
    const roster=[['Sebastian Aho','C • Top line'],['Andrei Svechnikov','RW • PP1'],['Seth Jarvis','RW • Hot streak'],['Jaccob Slavin','D • Defensive anchor'],['Jordan Staal','C • Two-way center'],['Brent Burns','D • PP2'],['Pyotr Kochetkov','G • Starting goalie'],['Jesperi Kotkaniemi','C • Middle six'],['Jackson Blake','RW • Rookie spark']];
    let currentState='pregame',currentPick=0,lastDrafted='',mode='regular';
    let picks={Aaron:[],Julie:[]},sheetDraft={Aaron:[],Julie:[]};
    let scores={Aaron:0,Julie:0};
    let playerStats={};
    const order=['Aaron','Julie','Aaron','Julie'];
    const feed=[];
    const root=document.getElementById('gd-root');
    const shell=document.getElementById('shell');
    const manageSheet=document.getElementById('manageSheet');
    const manageSheetActions=document.getElementById('manageSheetActions');

    function ensurePlayer(name){if(!playerStats[name])playerStats[name]={goals:0,assists:0,firstGoal:false}}
    function claimedBy(name){return picks.Aaron.includes(name)?'Aaron':picks.Julie.includes(name)?'Julie':null}
    function activePlayer(){return order[currentPick]||'Draft complete'}
    function pregameMeta(side){const count=picks[side].length;return `<div class='gd-pick-meta'><span class='gd-pick-chip ${count===2?'active':''}'>${count} of 2 locked</span></div>`}
    function boardSubline(){if(currentState==='pregame') return currentPick>=4?'Picks ready for puck drop':`${activePlayer()} on the clock • Pick ${currentPick+1} of 4`; if(currentState==='live') return mode==='playoffs'?'Playoff rivalry scoring live':'Rivalry scoring live'; return 'Final score'}
    function momentumWidth(){return Math.min(Math.abs(scores.Aaron-scores.Julie)*12,48)}
    function topBoard(label){const period=currentState==='pregame'?(mode==='playoffs'?'Playoff Night • 7:00 PM':'Tonight • 7:00 PM'):currentState==='live'?'2nd • 8:14':'Final'; const synced=currentState==='live'?"<span class='gd-pill synced'>Synced</span>":''; const liveMomentum=currentState==='live'?`<div class='gd-momentum-label'>Momentum</div><div class='gd-track'><div class='gd-track-fill' style='left:${scores.Aaron>=scores.Julie?'50%':`calc(50% - ${momentumWidth()}%)`};width:${momentumWidth()}%'></div></div>`:''; const left=currentState==='pregame'?pregameMeta('Aaron'):`<div class='gd-side-value'>${scores.Aaron}</div>`; const right=currentState==='pregame'?pregameMeta('Julie'):`<div class='gd-side-value'>${scores.Julie}</div>`; const heroClass=currentState==='final'?'gd-hero gd-hero-final':'gd-hero'; return `<section class='${heroClass}'><div class='gd-status-row'><span class='gd-pill ${currentState==='final'?'final':'live'}'>${label}</span><span class='gd-period'>${period}</span>${synced}</div><div class='gd-score-grid'><div class='gd-side'><div class='gd-side-label red'>Aaron</div>${left}</div><div class='gd-center'><img class='gd-logo' src='${logo}' alt='Canes Rivalry'></div><div class='gd-side'><div class='gd-side-label'>Julie</div>${right}</div></div><div class='gd-subline'>${boardSubline()}</div>${liveMomentum}</section>`}
    function lockedRows(side){const arr=picks[side]; const filled=arr.map(name=>`<div class='gd-pick-row ${name===lastDrafted?'is-new':''}'><div class='gd-pick-icon'>✓</div><div class='gd-pick-main'><strong>${name}</strong><small>Locked pick</small><div class='gd-lock-actions'><button class='gd-small-action' data-side='${side}' data-player='${name}'>Change Pick</button></div></div></div>`).join(''); const empty=Array.from({length:2-arr.length},()=>`<div class='gd-pick-row is-empty'><div class='gd-pick-icon'>…</div><div class='gd-pick-main'><strong>Open slot</strong><small>Waiting for next pick</small></div></div>`).join(''); return filled+empty}
    function statChips(name){ensurePlayer(name); const s=playerStats[name]; const chips=[`<span class='gd-stat ${s.goals?'live':''}'>G ${s.goals}</span>`,`<span class='gd-stat ${s.assists?'live':''}'>A ${s.assists}</span>`]; if(s.firstGoal) chips.push(`<span class='gd-stat live'>FG</span>`); return chips.join('')}
    function totalForPlayer(name){ensurePlayer(name); const s=playerStats[name]; return s.goals*2+s.assists+(s.firstGoal?2:0)}
    function compactPlayerRows(side){const arr=picks[side].length?picks[side]:[]; if(!arr.length)return`<div class='gd-player-card'><div class='gd-player-main'><strong>No pick</strong></div><div class='gd-player-total'>+0</div></div>`; return arr.map(name=>`<div class='gd-player-card'><div class='gd-player-main'><strong>${name}</strong><div class='gd-player-stats'>${statChips(name)}</div></div><div class='gd-player-total'>+${totalForPlayer(name)}</div></div>`).join('')}
    function bindChangePick(){document.querySelectorAll('.gd-small-action').forEach(btn=>btn.onclick=()=>removePick(btn.dataset.side,btn.dataset.player))}
    function bindManage(){const open=document.getElementById('openManage'); if(open) open.onclick=openManageSheet}
    function renderPregame(filter=''){const rows=roster.filter(([n])=>n.toLowerCase().includes(filter.toLowerCase())); root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Pregame')}<div class='gd-label-row'><div class='gd-label'>Live Picks</div><div class='gd-filter'>Updates instantly</div></div><section class='gd-picks-grid'><article class='gd-panel'><div class='gd-panel-head red'><span>Aaron</span><span>${picks.Aaron.length}/2</span></div>${lockedRows('Aaron')}</article><article class='gd-panel'><div class='gd-panel-head dark'><span>Julie</span><span>${picks.Julie.length}/2</span></div>${lockedRows('Julie')}</article></section><section class='gd-search'><input class='gd-search-input' id='playerSearch' placeholder='Search current Canes roster...' value='${filter.replace(/'/g,'&#39;')}' /></section><div class='gd-label-row'><div class='gd-label'>Current Canes Roster</div><div class='gd-filter'>Tap to draft</div></div><section class='gd-panel gd-roster gd-scroll'>${rows.map(([name,detail])=>{const owner=claimedBy(name);return `<div class='gd-roster-row ${owner?'claimed':''} ${owner?'':'clickable'} ${name===lastDrafted&&owner?'is-new':''}' data-player='${name}'><div class='gd-pick-main'><strong>${name}</strong><small>${detail}</small></div>${owner?`<span class='gd-tag'>${owner}</span>`:`<span class='gd-draft-btn'>Draft</span>`}</div>`}).join('')}</section></div></section>`; document.querySelectorAll('.clickable').forEach(el=>el.onclick=()=>draftPlayer(el.dataset.player)); const search=document.getElementById('playerSearch'); if(search) search.oninput=e=>renderPregame(e.target.value); bindChangePick()}
    function draftPlayer(name){if(currentPick>=4||claimedBy(name)) return; const side=order[currentPick]; if(picks[side].length>=2) return; picks[side].push(name); ensurePlayer(name); lastDrafted=name; currentPick+=1; renderPregame(document.getElementById('playerSearch')?.value||'')}
    function removePick(side,name){picks[side]=picks[side].filter(p=>p!==name); currentPick=picks.Aaron.length+picks.Julie.length; lastDrafted=''; renderPregame(document.getElementById('playerSearch')?.value||'')}
    function renderLive(){root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Live')}<div class='gd-label-row'><div class='gd-label'>Picked Players</div><button class='gd-manage-tiny' type='button' id='openManage'>Manage</button></div><section class='gd-picks-grid'><article class='gd-card'><div class='gd-pick-card-head'><strong class='red'>Aaron</strong><span>${scores.Aaron} pts</span></div>${compactPlayerRows('Aaron')}</article><article class='gd-card'><div class='gd-pick-card-head'><strong>Julie</strong><span>${scores.Julie} pts</span></div>${compactPlayerRows('Julie')}</article></section><div class='gd-label-row'><div class='gd-label'>Simulate Updates</div><div class='gd-filter'>Goal / Assist / Bonus</div></div><div class='gd-sim-grid'><button class='gd-sim-button red' data-side='Aaron' data-kind='goal'>Aaron Goal</button><button class='gd-sim-button' data-side='Julie' data-kind='goal'>Julie Goal</button><button class='gd-sim-button red' data-side='Aaron' data-kind='assist'>Aaron Assist</button><button class='gd-sim-button' data-side='Julie' data-kind='assist'>Julie Assist</button><button class='gd-sim-button red' data-side='Aaron' data-kind='first'>Aaron First Goal</button><button class='gd-sim-button' data-side='Julie' data-kind='first'>Julie First Goal</button></div><div class='gd-label-row'><div class='gd-label'>Rivalry Feed</div><div class='gd-filter'>Live</div></div><section class='gd-feed-list'>${feed.map(item=>`<article class='gd-card gd-feed-item'><div class='gd-feed-icon'>🚨</div><div><div><strong>${item.title}</strong></div><div class='gd-feed-sub'>${item.detail}</div></div><div><strong>+${item.points}</strong></div></article>`).join('')}</section></div></section>`; document.querySelectorAll('.gd-sim-button').forEach(btn=>btn.onclick=()=>simulate(btn.dataset.side,btn.dataset.kind)); bindManage()}
    function applyToSide(side,kind){const players=picks[side]; if(!players.length) return; const target=players[0]; ensurePlayer(target); if(kind==='goal'){playerStats[target].goals+=1; scores[side]+=2; feed.unshift({title:`${target} goal`,detail:`${side} scores through a picked player`,points:2})} if(kind==='assist'){playerStats[target].assists+=1; scores[side]+=1; feed.unshift({title:`${target} assist`,detail:`${side} adds an assist point`,points:1})} if(kind==='first'){if(playerStats[target].firstGoal) return; playerStats[target].firstGoal=true; scores[side]+=2; feed.unshift({title:`${target} first Canes goal`,detail:`${side} gets the first goal bonus`,points:2})}}
    function simulate(side,kind){applyToSide(side,kind); renderLive()}
    function mvpText(){const all=[...picks.Aaron,...picks.Julie]; if(!all.length)return'No MVP yet'; let best=all[0],bestPts=-1; all.forEach(name=>{const pts=totalForPlayer(name); if(pts>bestPts){bestPts=pts; best=name}}); return `${best} • ${bestPts} pts`}
    function recapText(){const winner=scores.Aaron===scores.Julie?'Night ends level':scores.Aaron>scores.Julie?'Aaron takes rivalry night':'Julie takes rivalry night'; return `${winner} with ${scores.Aaron}-${scores.Julie} final scoring.`}
    function renderFinal(){const winner=scores.Aaron>scores.Julie?'Aaron':scores.Julie>scores.Aaron?'Julie':'Tie'; root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Final')}<section class='gd-win-card'><div class='gd-celebrate'>${mode==='playoffs'?'🏒🔥🏒':'🎉'}</div><div class='gd-win-banner'>${winner==='Tie'?'Rivalry Tie':winner+' Wins'}</div><div class='gd-win-sub'>${mode==='playoffs'?'Playoff Night Complete':'Game Complete'}</div></section><div class='gd-story-stack'><section class='gd-card gd-story-item'><div class='gd-feed-icon'>⭐</div><div><strong>Rivalry MVP</strong><div class='gd-feed-sub'>${mvpText()}</div></div><div><strong>MVP</strong></div></section><section class='gd-card gd-story-item'><div class='gd-feed-icon'>🏁</div><div><strong>Rivalry Recap</strong><div class='gd-feed-sub'>${recapText()}</div></div><div><strong>${scores.Aaron}-${scores.Julie}</strong></div></section></div><div class='gd-label-row'><div class='gd-label'>Final Pick Breakdown</div><button class='gd-manage-tiny' type='button' id='openManage'>Manage</button></div><section class='gd-final-picks'><article class='gd-card'><div class='gd-pick-card-head'><strong class='red'>Aaron</strong><span>${scores.Aaron} pts</span></div>${compactPlayerRows('Aaron')}</article><article class='gd-card'><div class='gd-pick-card-head'><strong>Julie</strong><span>${scores.Julie} pts</span></div>${compactPlayerRows('Julie')}</article></section></div></section>`; bindManage()}
    function buildManageOptions(selected,exclude){return [''].concat(roster.map(r=>r[0])).map(name=>`<option value='${name}' ${selected===name?'selected':''} ${(name&&exclude===name)?'disabled':''}>${name||'Open slot'}</option>`).join('')}
    function openManageSheet(){sheetDraft={Aaron:[...(picks.Aaron.length?picks.Aaron:['',''])],Julie:[...(picks.Julie.length?picks.Julie:['',''])]}; while(sheetDraft.Aaron.length<2)sheetDraft.Aaron.push(''); while(sheetDraft.Julie.length<2)sheetDraft.Julie.push(''); renderManageSheet(); manageSheet.classList.add('is-open')}
    function renderManageSheet(){manageSheetActions.innerHTML=`<div class='gd-sheet-pick'><strong>Aaron Pick 1</strong><small>Swap locked player</small><select class='gd-sheet-select' data-side='Aaron' data-index='0'>${buildManageOptions(sheetDraft.Aaron[0],sheetDraft.Aaron[1]||sheetDraft.Julie[0]||sheetDraft.Julie[1]||'')}</select></div><div class='gd-sheet-pick'><strong>Aaron Pick 2</strong><small>Swap locked player</small><select class='gd-sheet-select' data-side='Aaron' data-index='1'>${buildManageOptions(sheetDraft.Aaron[1],sheetDraft.Aaron[0]||sheetDraft.Julie[0]||sheetDraft.Julie[1]||'')}</select></div><div class='gd-sheet-pick'><strong>Julie Pick 1</strong><small>Swap locked player</small><select class='gd-sheet-select' data-side='Julie' data-index='0'>${buildManageOptions(sheetDraft.Julie[0],sheetDraft.Julie[1]||sheetDraft.Aaron[0]||sheetDraft.Aaron[1]||'')}</select></div><div class='gd-sheet-pick'><strong>Julie Pick 2</strong><small>Swap locked player</small><select class='gd-sheet-select' data-side='Julie' data-index='1'>${buildManageOptions(sheetDraft.Julie[1],sheetDraft.Julie[0]||sheetDraft.Aaron[0]||sheetDraft.Aaron[1]||'')}</select></div>`; document.querySelectorAll('.gd-sheet-select').forEach(sel=>sel.onchange=e=>{const side=e.target.dataset.side; const index=Number(e.target.dataset.index); sheetDraft[side][index]=e.target.value; renderManageSheet()})}
    function saveManageSheet(){picks={Aaron:sheetDraft.Aaron.filter(Boolean),Julie:sheetDraft.Julie.filter(Boolean)}; currentPick=Math.min(picks.Aaron.length+picks.Julie.length,4); manageSheet.classList.remove('is-open'); render()}
    function render(){shell.classList.toggle('mode-playoffs',mode==='playoffs'); if(currentState==='pregame')renderPregame(); else if(currentState==='live')renderLive(); else renderFinal()}
    document.querySelectorAll('.gd-state-button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.gd-state-button').forEach(b=>b.classList.remove('is-active')); btn.classList.add('is-active'); currentState=btn.dataset.state; render()});
    document.querySelectorAll('.gd-mode-button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.gd-mode-button').forEach(b=>b.classList.remove('is-active')); btn.classList.add('is-active'); mode=btn.dataset.mode; render()});
    document.getElementById('closeSheet').onclick=()=>manageSheet.classList.remove('is-open'); document.getElementById('saveSheet').onclick=saveManageSheet; manageSheet.onclick=(e)=>{if(e.target===manageSheet)manageSheet.classList.remove('is-open')};
    render();
  </script>
</body>
</html>
