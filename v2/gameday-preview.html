<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canes Rivalry Game Day Preview</title>
  <link rel="icon" type="image/png" href="./assets/app-icon.png?v=gdp1" />
  <link rel="apple-touch-icon" href="./assets/app-icon.png?v=gdp1" />
  <link rel="stylesheet" href="./css/gameday-preview.css?v=gdp1" />
</head>
<body>
  <div class="gd-shell">
    <header class="gd-header">
      <div>
        <div class="gd-eyebrow">Canes Rivalry V2</div>
        <h1>Game Day Preview</h1>
      </div>
      <img src="./assets/app-icon.png?v=gdp1" alt="Canes Rivalry app icon" class="gd-app-icon" />
    </header>

    <section class="gd-state-bar">
      <button class="gd-state-button is-active" data-state="pregame" type="button">Pregame</button>
      <button class="gd-state-button" data-state="live" type="button">Live</button>
      <button class="gd-state-button" data-state="final" type="button">Final</button>
    </section>

    <main id="gd-root"></main>
  </div>

  <script src="./js/gameday-preview.js?v=gdp1"></script>
</body>
</html>
