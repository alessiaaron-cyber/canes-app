<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canes Rivalry Game Day Sandbox</title>
  <style>
    :root{--gd-red:#c8102e;--gd-red-soft:#fff1f4;--gd-ink:#11151f;--gd-muted:#707986;--gd-border:#e7e9ee;--gd-bg:#f7f8fa;--gd-card:#fff;--gd-radius-shell:26px;--gd-radius-card:18px;--gd-radius-pill:999px;--gd-shadow:0 16px 30px rgba(17,21,31,.06)}
    *{box-sizing:border-box} body{margin:0;background:var(--gd-bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:var(--gd-ink)}
    .gd-shell{width:min(100%,430px);margin:0 auto;min-height:100vh;padding:16px 14px 34px}.gd-preview-head{margin-bottom:14px}.gd-eyebrow{color:var(--gd-muted);font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.gd-preview-head h1{margin:6px 0 0;font-size:2.2rem;line-height:.92;letter-spacing:-.08em}.gd-preview-head p{margin:7px 0 0;color:var(--gd-muted);font-size:.9rem;font-weight:600}
    .gd-state-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.gd-state-button{height:42px;border:1px solid var(--gd-border);border-radius:14px;background:#fff;color:var(--gd-muted);font-weight:900}.gd-state-button.is-active{background:var(--gd-ink);border-color:var(--gd-ink);color:#fff}
    .gd-phone{overflow:hidden;background:var(--gd-card);border:1px solid var(--gd-border);border-radius:var(--gd-radius-shell);box-shadow:var(--gd-shadow)}.gd-main{padding:12px;display:flex;flex-direction:column;gap:12px}
    .gd-live-score-card,.gd-pick-panel,.gd-roster-panel,.gd-override-card,.gd-pick-summary-card,.gd-feed-item,.gd-recap-item,.gd-mvp{border:1px solid var(--gd-border);border-radius:var(--gd-radius-card);background:#fff}.gd-live-score-card,.gd-override-card,.gd-pick-summary-card,.gd-feed-item,.gd-recap-item,.gd-mvp{padding:13px 14px}.gd-live-score-card{padding:6px 2px 0}
    .gd-status-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}.gd-pill{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:0 10px;border-radius:var(--gd-radius-pill);font-size:.71rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}.gd-pill.live{background:var(--gd-red);color:#fff}.gd-pill.final{color:var(--gd-muted)}.gd-pill.synced{color:#1a8b35}.gd-period{font-size:.9rem;font-weight:900}.gd-score-grid{display:grid;grid-template-columns:72px 1fr 72px;gap:12px;align-items:center}.gd-side-score-wrap{text-align:center}.gd-side-score-label{font-size:.77rem;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}.gd-side-score-label.red{color:var(--gd-red)}.gd-side-score-value{margin-top:4px;font-size:3.7rem;line-height:.85;letter-spacing:-.08em;font-weight:1000}.gd-center-score{text-align:center}.gd-logo{width:58px;height:58px;border-radius:16px;object-fit:cover}.gd-summary-line{text-align:center;font-size:.96rem;font-weight:700;line-height:1.32;margin:10px 14px 0}.gd-momentum-label{text-align:center;color:var(--gd-muted);font-size:.74rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin:12px 0 8px}.gd-track{position:relative;height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(17,21,31,.12),rgba(17,21,31,.06) 48%,rgba(17,21,31,.06) 52%,rgba(200,16,46,.12))}.gd-track-fill{position:absolute;top:0;bottom:0;border-radius:inherit;background:linear-gradient(90deg,var(--gd-red),#ff8c9e)}
    .gd-section-label-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.gd-section-label{font-size:.76rem;font-weight:1000;letter-spacing:.08em;text-transform:uppercase}.gd-filter{color:var(--gd-muted);font-size:.76rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
    .gd-picks-grid,.gd-picks-summary,.gd-sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gd-pick-panel{overflow:hidden}.gd-pick-panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;color:#fff;font-size:.76rem;font-weight:1000;letter-spacing:.05em;text-transform:uppercase}.gd-pick-panel-head.red{background:linear-gradient(135deg,var(--gd-red),#8d1225)}.gd-pick-panel-head.dark{background:linear-gradient(135deg,#202530,#434b57)}.gd-pick-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;padding:11px 12px;border-top:1px solid var(--gd-border)}.gd-pick-row:first-child{border-top:0}.gd-pick-row.is-empty{background:#fafbfc}.gd-pick-row-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f8f0f2;color:var(--gd-red);font-size:.75rem}.gd-pick-row-main strong{display:block;font-size:.9rem;font-weight:900}.gd-pick-row-main small{display:block;margin-top:3px;color:var(--gd-muted);font-size:.75rem;font-weight:700}.gd-lock-actions{display:flex;gap:8px;margin-top:8px}.gd-small-action{border:1px solid var(--gd-border);background:#fff;border-radius:999px;padding:6px 10px;font-size:.72rem;font-weight:900;color:var(--gd-muted)}
    .gd-search-bar{display:flex;gap:10px;align-items:center;padding:12px 14px;border:1px solid var(--gd-border);border-radius:18px;background:#fff}.gd-search-input{flex:1;border:0;background:#f4f6f8;border-radius:12px;padding:12px 14px;font:inherit;color:var(--gd-ink)}.gd-roster-panel{padding:0;overflow:hidden}.gd-scroll-roster{max-height:340px;overflow:auto}.gd-roster-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 14px;border-top:1px solid var(--gd-border)}.gd-roster-row:first-child{border-top:0}.gd-player-selectable{cursor:pointer}.gd-player-selectable:hover{background:#fff7f8}.gd-roster-row.is-claimed{background:#fafbfc}.gd-roster-row.is-claimed .gd-pick-row-main strong,.gd-roster-row.is-claimed .gd-pick-row-main small{color:#a0a8b5}.gd-add,.gd-claimed-tag{min-width:58px;height:24px;padding:0 8px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900}.gd-add{background:var(--gd-red);color:#fff}.gd-claimed-tag{background:#edf1f5;color:var(--gd-muted)}
    .gd-override-copy,.gd-feed-subtitle{color:var(--gd-muted);font-size:.8rem;font-weight:700}.gd-sim-button{border:1px solid var(--gd-border);border-radius:16px;padding:14px 12px;background:#fff;font-weight:900;color:var(--gd-ink)}.gd-sim-button.red{background:var(--gd-red);border-color:var(--gd-red);color:#fff}.gd-pick-summary-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;font-size:.78rem;font-weight:1000;text-transform:uppercase}.gd-red-text{color:var(--gd-red)}.gd-pick-summary-row{display:flex;justify-content:space-between;gap:10px;padding-top:8px;margin-top:8px;border-top:1px solid var(--gd-border);font-size:.9rem;font-weight:700}
    .gd-feed-item,.gd-recap-item,.gd-mvp{display:grid;gap:12px;align-items:center}.gd-feed-item{grid-template-columns:auto 1fr auto}.gd-recap-item{grid-template-columns:auto auto 1fr auto}.gd-mvp{grid-template-columns:68px 1fr auto}.gd-feed-icon,.gd-mvp-ring{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f7f8fa;color:var(--gd-red)}.gd-mvp-ring{width:64px;height:64px;border:5px solid #d9dce2;border-left-color:var(--gd-red);background:#fff;color:var(--gd-ink)}
    @media (max-width:390px){.gd-picks-grid,.gd-picks-summary,.gd-sim-grid,.gd-score-grid{grid-template-columns:1fr}.gd-side-score-value{font-size:3rem}}
  </style>
</head>
<body>
  <div class="gd-shell">
    <header class="gd-preview-head"><div><div class="gd-eyebrow">Canes Rivalry V2</div><h1>Game Day Sandbox</h1><p>Standalone interactive preview.</p></div></header>
    <section class="gd-state-bar"><button class="gd-state-button is-active" data-state="pregame" type="button">Pregame</button><button class="gd-state-button" data-state="live" type="button">Live</button><button class="gd-state-button" data-state="final" type="button">Final</button></section>
    <main id="gd-root"></main>
  </div>
  <script>
    const logo='./assets/app-icon.png';
    const roster=[['Sebastian Aho','C • Top line'],['Andrei Svechnikov','RW • PP1'],['Seth Jarvis','RW • Hot streak'],['Jaccob Slavin','D • Defensive anchor'],['Jordan Staal','C • Two-way center'],['Brent Burns','D • PP2'],['Pyotr Kochetkov','G • Starting goalie'],['Jesperi Kotkaniemi','C • Middle six'],['Jackson Blake','RW • Rookie spark']];
    let currentState='pregame',currentPick=0,scores={Aaron:0,Julie:0},picks={Aaron:[],Julie:[]};
    const order=['Aaron','Julie','Aaron','Julie'],feed=[]; const root=document.getElementById('gd-root');
    function claimedBy(p){return picks.Aaron.includes(p)?'Aaron':picks.Julie.includes(p)?'Julie':null}
    function activePlayer(){return order[currentPick]||'Draft complete'}
    function scoreCell(side){return currentState==='pregame'?String(picks[side].length):String(scores[side])}
    function boardSubline(){if(currentState==='pregame') return `${activePlayer()} on the clock • Pick ${Math.min(currentPick+1,4)}/4`; if(currentState==='live') return 'Live picks become scoring cards here'; if(scores.Aaron>scores.Julie) return 'Aaron wins the night'; if(scores.Julie>scores.Aaron) return 'Julie wins the night'; return 'Rivalry tied'}
    function momentumWidth(){return Math.min(Math.abs(scores.Aaron-scores.Julie)*12,48)}
    function topBoard(label){const period=currentState==='pregame'?'Tonight • 7:00 PM':currentState==='live'?'2nd • 8:14':'Final'; const synced=currentState==='live'?"<span class='gd-pill synced'>Synced</span>":''; const pregameMeta=currentState==='pregame'?"<div class='gd-momentum-label'>Goals • Assists • First Canes Goal</div>":''; const liveMomentum=currentState==='live'?`<div class='gd-momentum-label'>Momentum</div><div class='gd-track'><div class='gd-track-fill' style='left:${scores.Aaron>=scores.Julie?'50%':`calc(50% - ${momentumWidth()}%)`};width:${momentumWidth()}%'></div></div>`:''; return `<section class='gd-live-score-card'><div class='gd-status-row'><span class='gd-pill ${currentState==='final'?'final':'live'}'>${label}</span><span class='gd-period'>${period}</span>${synced}</div><div class='gd-score-grid'><div class='gd-side-score-wrap'><div class='gd-side-score-label red'>Aaron</div><div class='gd-side-score-value'>${scoreCell('Aaron')}</div></div><div class='gd-center-score'><img class='gd-logo' src='${logo}' alt='Canes Rivalry'></div><div class='gd-side-score-wrap'><div class='gd-side-score-label'>Julie</div><div class='gd-side-score-value'>${scoreCell('Julie')}</div></div></div><div class='gd-summary-line'>${boardSubline()}</div>${pregameMeta}${liveMomentum}</section>`}
    function locked(name){const arr=picks[name]; const filled=arr.map(player=>`<div class='gd-pick-row'><div class='gd-pick-row-icon'>✓</div><div class='gd-pick-row-main'><strong>${player}</strong><small>Locked pick</small><div class='gd-lock-actions'><button class='gd-small-action' data-side='${name}' data-player='${player}'>Change Pick</button></div></div></div>`).join(''); const empty=Array.from({length:2-arr.length},()=>`<div class='gd-pick-row is-empty'><div class='gd-pick-row-icon'>…</div><div class='gd-pick-row-main'><strong>Open slot</strong><small>Waiting for next pick</small></div></div>`).join(''); return filled+empty}
    function bindChangePick(){document.querySelectorAll('.gd-small-action').forEach(btn=>btn.onclick=()=>removePick(btn.dataset.side,btn.dataset.player))}
    function renderPregame(filter=''){const rows=roster.filter(([n])=>n.toLowerCase().includes(filter.toLowerCase())); root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Pregame')}<div class='gd-section-label-row'><div class='gd-section-label'>Live Picks</div><div class='gd-filter'>Updates instantly</div></div><section class='gd-picks-grid'><article class='gd-pick-panel'><div class='gd-pick-panel-head red'><span>Aaron</span><span>${picks.Aaron.length}/2</span></div>${locked('Aaron')}</article><article class='gd-pick-panel'><div class='gd-pick-panel-head dark'><span>Julie</span><span>${picks.Julie.length}/2</span></div>${locked('Julie')}</article></section><section class='gd-search-bar'><input class='gd-search-input' id='playerSearch' placeholder='Search current Canes roster...' value='${filter.replace(/'/g,'&#39;')}' /></section><div class='gd-section-label-row'><div class='gd-section-label'>Current Canes Roster</div><div class='gd-filter'>Tap to draft</div></div><section class='gd-roster-panel gd-scroll-roster'>${rows.map(([name,detail])=>{const owner=claimedBy(name);return `<div class='gd-roster-row ${owner?'is-claimed':''} ${owner?'':'gd-player-selectable'}' data-player='${name}'><div class='gd-pick-row-main'><strong>${name}</strong><small>${detail}</small></div>${owner?`<span class='gd-claimed-tag'>${owner}</span>`:`<span class='gd-add'>Draft</span>`}</div>`}).join('')}</section><div class='gd-section-label-row'><div class='gd-section-label'>Manage Picks</div><div class='gd-filter'>Only if needed</div></div><section class='gd-override-card'><div class='gd-override-copy'>Late override should open from a small Manage Picks action in live mode, not as a large permanent section.</div></section></div></section>`; document.querySelectorAll('.gd-player-selectable').forEach(el=>el.onclick=()=>draftPlayer(el.dataset.player)); const search=document.getElementById('playerSearch'); if(search) search.oninput=e=>renderPregame(e.target.value); bindChangePick()}
    function draftPlayer(player){if(currentPick>=4||claimedBy(player)) return; const side=order[currentPick]; if(picks[side].length>=2) return; picks[side].push(player); currentPick+=1; renderPregame(document.getElementById('playerSearch')?.value||'')}
    function removePick(side,player){picks[side]=picks[side].filter(p=>p!==player); currentPick=picks.Aaron.length+picks.Julie.length; renderPregame(document.getElementById('playerSearch')?.value||'')}
    function renderLive(){root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Live')}<div class='gd-section-label-row'><div class='gd-section-label'>Manage Picks</div><div class='gd-filter'>Small action</div></div><section class='gd-override-card'><div class='gd-override-copy'>Late override should open from a small Manage Picks action here, not as a large permanent section.</div></section><div class='gd-section-label-row'><div class='gd-section-label'>Simulate Updates</div><div class='gd-filter'>Goal / Assist</div></div><div class='gd-sim-grid'><button class='gd-sim-button red' data-side='Aaron' data-points='2' data-type='Goal'>Aaron Goal</button><button class='gd-sim-button' data-side='Julie' data-points='2' data-type='Goal'>Julie Goal</button><button class='gd-sim-button red' data-side='Aaron' data-points='1' data-type='Assist'>Aaron Assist</button><button class='gd-sim-button' data-side='Julie' data-points='1' data-type='Assist'>Julie Assist</button></div><div class='gd-section-label-row'><div class='gd-section-label'>Tonight’s Picks</div><div class='gd-filter'>By stats</div></div><section class='gd-picks-summary'><article class='gd-pick-summary-card'><div class='gd-pick-summary-head'><span class='gd-red-text'>Aaron</span><span>${scores.Aaron} pts</span></div>${(picks.Aaron.length?picks.Aaron:['No picks']).map((p,i)=>`<div class='gd-pick-summary-row'><span>${p}</span><strong>${i===0&&scores.Aaron?'+4':i===1&&scores.Aaron>4?`+${scores.Aaron-4}`:'+0'}</strong></div>`).join('')}</article><article class='gd-pick-summary-card'><div class='gd-pick-summary-head'><span>Julie</span><span>${scores.Julie} pts</span></div>${(picks.Julie.length?picks.Julie:['No picks']).map((p,i)=>`<div class='gd-pick-summary-row'><span>${p}</span><strong>${i===0&&scores.Julie?'+2':i===1&&scores.Julie>2?`+${scores.Julie-2}`:'+0'}</strong></div>`).join('')}</article></section><div class='gd-section-label-row'><div class='gd-section-label'>Rivalry Feed</div><div class='gd-filter'>Live</div></div><section>${feed.map(item=>`<article class='gd-feed-item'><div class='gd-feed-icon'>🚨</div><div><div><strong>${item.title}</strong></div><div class='gd-feed-subtitle'>${item.detail}</div></div><div><strong>+${item.points}</strong></div></article>`).join('')}</section></div></section>`; document.querySelectorAll('.gd-sim-button').forEach(btn=>btn.onclick=()=>simulate(btn.dataset.side,Number(btn.dataset.points),btn.dataset.type))}
    function simulate(side,points,type){scores[side]+=points; feed.unshift({title:`${side} ${type}`,detail:'Live rivalry update',points}); renderLive()}
    function renderFinal(){const winner=scores.Aaron>scores.Julie?'Aaron':scores.Julie>scores.Aaron?'Julie':'Tie'; root.innerHTML=`<section class='gd-phone'><div class='gd-main'>${topBoard('Final')}<section class='gd-recap-item'><div class='gd-feed-icon'>🏁</div><div>Final</div><div><strong>Rivalry recap</strong><div class='gd-feed-subtitle'>Draft picks fed directly into the live scoring experience.</div></div><div><strong>${scores.Aaron}-${scores.Julie}</strong></div></section><section class='gd-mvp'><div class='gd-mvp-ring'>★</div><div><strong>Rivalry MVP</strong><div class='gd-feed-subtitle'>Final state animation and recap placeholder for the real app.</div></div><div><strong>${winner==='Tie'?'Tie':'Final'}</strong></div></section></div></section>`}
    function render(){if(currentState==='pregame')renderPregame(); else if(currentState==='live')renderLive(); else renderFinal()}
    document.querySelectorAll('.gd-state-button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.gd-state-button').forEach(b=>b.classList.remove('is-active')); btn.classList.add('is-active'); currentState=btn.dataset.state; render()});
    render();
  </script>
</body>
</html>
